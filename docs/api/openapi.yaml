        "200":
          description: Queue health
          content:
            application/json:
              schema:
                type: object

  # ============= Admin =============
  /api/admin/health:
    get:
      tags: [Admin]
      summary: Comprehensive system health check
      security: []
      responses:
        "200":
          description: System health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
                  uptime:
                    type: number
                  memory:
                    type: object
                    properties:
                      rss:
                        type: integer
                      heapUsed:
                        type: integer
                      heapTotal:
                        type: integer
                  database:
                    type: string
                    enum: [connected, disconnected, unknown]
                  storage:
                    type: string
                    enum: [s3, local]
                  nodeVersion:
                    type: string

  /api/admin/queue/status:
    get:
      tags: [Admin]
      summary: Job queue status
      security: []
      responses:
        "200":
          description: Queue status
          content:
            application/json:
              schema:
                type: object

  /api/admin/queue/health:
    get:
      tags: [Admin]
      summary: Queue health check
      security: []
      responses:
        "200":
          description: Queue health
          content:
            application/json:
              schema:
                type: object

  /api/admin/stats:
    get:
      tags: [Admin]
      summary: Basic system statistics
      security: []
      responses:
        "200":
          description: System stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
                  jobs:
                    type: object
                    properties:
                      total:
                        type: integer
                  users:
                    type: object
                    properties:
                      total:
                        type: integer
                  uptime:
                    type: number
                  storage:
                    type: string
