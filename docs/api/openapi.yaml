openapi: 3.1.0
info:
  title: CertMate (EICR-oMatic 3000) API
  version: 1.0.0
  description: |
    Backend API for CertMate — automated EICR/EIC electrical certificate creation
    for electrical inspectors. Powered by Express/Node.js with ES modules.

    ## Authentication
    Most endpoints require a Bearer JWT token obtained via `POST /api/auth/login`.
    Pass the token in the `Authorization` header: `Bearer <token>`.

    ## Certificate Types
    - **EICR** — Electrical Installation Condition Report (periodic inspection)
    - **EIC** — Electrical Installation Certificate (new installations)
  contact:
    name: CertMate Support
  license:
    name: Proprietary

servers:
  - url: https://certmate.uk
    description: Production
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
    description: Health check endpoints
  - name: Auth
    description: Authentication — login, logout, refresh, current user
  - name: Jobs
    description: EICR/EIC job CRUD and processing
  - name: Job Data
    description: Get/update full job details, photos, history
  - name: Recording
    description: Real-time recording sessions (audio chunks, photos, finish)
  - name: CCU
    description: Consumer unit (fuseboard) photo analysis via GPT Vision
  - name: PDF
    description: PDF certificate generation
  - name: Export
    description: CSV, Excel, and bulk PDF export
  - name: Email & WhatsApp
    description: Certificate delivery via email or WhatsApp
  - name: OCR
    description: OCR extraction from existing certificates
  - name: Settings
    description: User defaults, company settings, inspector profiles, schema, regulations
  - name: Clients
    description: CRM — clients and properties
  - name: Analytics
    description: Job statistics and analytics
  - name: Billing
    description: Stripe subscription billing
  - name: Calendar
    description: Google Calendar integration
  - name: Push
    description: Web push notifications
  - name: Keys & Proxy
    description: API keys for iOS and proxy endpoints for Claude/TTS
  - name: Feedback
    description: Session feedback and optimizer reports
  - name: Admin
    description: System health, queue status, statistics
  - name: Queue
    description: Job queue status and health
  - name: Debug
    description: Debug reports and session diagnostics

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Success:
      type: object
      properties:
        success:
          type: boolean

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string

    JobSummary:
      type: object
      properties:
        id:
          type: string
        address:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, processing, done, failed]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Circuit:
      type: object
      description: A single circuit's test results and metadata
      properties:
        circuit_ref:
          type: string
        circuit_designation:
          type: string
        ocpd_type:
          type: string
        ocpd_rating_a:
          type: string
        ocpd_bs_en:
          type: string
        rcd_protected:
          type: boolean
        rcd_rating_ma:
          type: string
        measured_zs_ohm:
          type: string
        r1_r2_ohm:
          type: string
        ir_live_live_mohm:
          type: string
        ir_live_earth_mohm:
          type: string
        rcd_time_ms:
          type: string
        polarity_confirmed:
          type: string

    Observation:
      type: object
      properties:
        code:
          type: string
          description: "Classification code: C1, C2, C3, FI, or N/A"
        item_location:
          type: string
        observation_text:
          type: string
        schedule_item:
          type: string
        schedule_description:
          type: string
        photos:
          type: array
          items:
            type: string

    InstallationDetails:
      type: object
      properties:
        client_name:
          type: string
        address:
          type: string
        postcode:
          type: string
        town:
          type: string
        county:
          type: string
        premises_description:
          type: string
        installation_records_available:
          type: boolean
        evidence_of_additions_alterations:
          type: boolean
        next_inspection_years:
          type: string
        extent:
          type: string
        agreed_limitations:
          type: string
        agreed_with:
          type: string
        operational_limitations:
          type: string

    SupplyCharacteristics:
      type: object
      properties:
        earthing_arrangement:
          type: string
        live_conductors:
          type: string
        nominal_voltage_u:
          type: string
        nominal_frequency:
          type: string
        prospective_fault_current:
          type: string
        earth_loop_impedance_ze:
          type: string
        supply_polarity_confirmed:
          type: boolean

    BoardInfo:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        manufacturer:
          type: string
        phases:
          type: string
        ze:
          type: string
        zs_at_db:
          type: string
        ipf_at_db:
          type: string

    JobDetail:
      type: object
      properties:
        id:
          type: string
        address:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        certificate_type:
          type: string
          enum: [EICR, EIC]
        circuits:
          type: array
          items:
            $ref: "#/components/schemas/Circuit"
        observations:
          type: array
          items:
            $ref: "#/components/schemas/Observation"
        board_info:
          $ref: "#/components/schemas/BoardInfo"
        boards:
          type: array
          items:
            $ref: "#/components/schemas/BoardInfo"
          nullable: true
        installation_details:
          $ref: "#/components/schemas/InstallationDetails"
        supply_characteristics:
          $ref: "#/components/schemas/SupplyCharacteristics"
        inspection_schedule:
          type: object
          nullable: true
        inspector_id:
          type: string
          nullable: true
        extent_and_type:
          type: object
          nullable: true
        design_construction:
          type: object
          nullable: true

    Photo:
      type: object
      properties:
        filename:
          type: string
        url:
          type: string
        thumbnail_url:
          type: string

    Client:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        name:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        company:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Property:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        client_id:
          type: string
          nullable: true
        address:
          type: string
        postcode:
          type: string
          nullable: true
        property_type:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    RecordingFormData:
      type: object
      properties:
        circuits:
          type: array
          items:
            $ref: "#/components/schemas/Circuit"
        observations:
          type: array
          items:
            $ref: "#/components/schemas/Observation"
        installation_details:
          $ref: "#/components/schemas/InstallationDetails"
        supply_characteristics:
          $ref: "#/components/schemas/SupplyCharacteristics"
        board_info:
          $ref: "#/components/schemas/BoardInfo"

    SubscriptionStatus:
      type: object
      properties:
        plan:
          type: string
          enum: [free, pro]
        status:
          type: string
        stripe_subscription_id:
          type: string
          nullable: true
        current_period_end:
          type: string
          format: date-time
          nullable: true
        cancel_at_period_end:
          type: boolean
        billing_configured:
          type: boolean

security:
  - BearerAuth: []

paths:
  # ============= Health =============
  /health:
    get:
      tags: [Health]
      summary: Basic health check
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /api/health:
    get:
      tags: [Health]
      summary: API health check with storage info
      security: []
      responses:
        "200":
          description: API health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: eicr-backend
                  version:
                    type: string
                    example: "1.0.0"
                  storage:
                    type: string
                    enum: [s3, local]
                  timestamp:
                    type: string
                    format: date-time

  # ============= Auth =============
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          description: Missing email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Too many login attempts

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current user
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh an expired JWT token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          description: Invalid or expired token

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ============= Jobs =============
  /api/jobs/{userId}:
    get:
      tags: [Jobs]
      summary: List all jobs for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of job summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobSummary"
        "403":
          description: Access denied
    post:
      tags: [Jobs]
      summary: Create a blank job (no file upload)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                certificate_type:
                  type: string
                  enum: [EICR, EIC]
                  default: EICR
                address:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobSummary"
        "403":
          description: Access denied

  /api/upload:
    post:
      tags: [Jobs]
      summary: Upload files and start processing
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  maxItems: 20
                certificateType:
                  type: string
                  enum: [EICR, EIC]
                  default: EICR
      responses:
        "200":
          description: Files uploaded, processing started
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  jobId:
                    type: string
                  message:
                    type: string
        "400":
          description: No files uploaded

  /api/process-job:
    post:
      tags: [Jobs]
      summary: Process an existing job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, jobId]
              properties:
                userId:
                  type: string
                jobId:
                  type: string
                jobFolder:
                  type: string
                  description: Optional local filesystem path
      responses:
        "200":
          description: Processing complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  jobId:
                    type: string
                  result:
                    type: object
                    properties:
                      ok:
                        type: boolean
                      address:
                        type: string
                      outputs:
                        type: object
        "400":
          description: Missing required fields

  # ============= Job Data =============
  /api/job/{userId}/{jobId}:
    get:
      tags: [Job Data]
      summary: Get full job details
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
          description: Database job ID or folder name/address
      responses:
        "200":
          description: Full job data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetail"
        "404":
          description: Job not found
    put:
      tags: [Job Data]
      summary: Update full job data
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                circuits:
                  type: array
                  items:
                    $ref: "#/components/schemas/Circuit"
                observations:
                  type: array
                  items:
                    $ref: "#/components/schemas/Observation"
                board_info:
                  $ref: "#/components/schemas/BoardInfo"
                boards:
                  type: array
                  items:
                    $ref: "#/components/schemas/BoardInfo"
                installation_details:
                  $ref: "#/components/schemas/InstallationDetails"
                supply_characteristics:
                  $ref: "#/components/schemas/SupplyCharacteristics"
                inspection_schedule:
                  type: object
                inspector_id:
                  type: string
                extent_and_type:
                  type: object
                design_construction:
                  type: object
      responses:
        "200":
          description: Job updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
    delete:
      tags: [Job Data]
      summary: Delete a job
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"

  /api/job/{userId}/{jobId}/debug:
    get:
      tags: [Debug]
      summary: Get debug transcription data for a job
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Debug transcription data with audio URLs
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId:
                    type: string
                  jobId:
                    type: string
                  chunks:
                    type: array
                    items:
                      type: object
                  fullTranscript:
                    type: string
        "404":
          description: Debug data not found

  /api/job/{userId}/{jobId}/history:
    get:
      tags: [Job Data]
      summary: Get version history for a job
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of version snapshots
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    created_at:
                      type: string
                      format: date-time
                    summary:
                      type: string

  /api/job/{userId}/{jobId}/history/{versionId}:
    get:
      tags: [Job Data]
      summary: Get a specific version snapshot
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Version snapshot data
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Version not found

  # ============= Photos =============
  /api/job/{userId}/{jobId}/photos:
    get:
      tags: [Job Data]
      summary: Get all photos for a job
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
    post:
      tags: [Job Data]
      summary: Upload a new photo to a job
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
      responses:
        "200":
          description: Photo uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  photo:
                    $ref: "#/components/schemas/Photo"

  /api/job/{userId}/{jobId}/photos/{filename}:
    get:
      tags: [Job Data]
      summary: Get a specific photo (binary)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
        - name: filename
          in: path
          required: true
          schema:
            type: string
        - name: thumbnail
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Photo binary data
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        "404":
          description: Photo not found

  # ============= Recording =============
  /api/recording/start:
    post:
      tags: [Recording]
      summary: Start a new real-time recording session
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                address:
                  type: string
                jobId:
                  type: string
                  description: Link to an existing job
      responses:
        "200":
          description: Session started
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId:
                    type: string
                  jobId:
                    type: string
                    nullable: true
                  message:
                    type: string

  /api/recording/{sessionId}/chunk:
    post:
      tags: [Recording]
      summary: Process an audio chunk and return updated form data
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [audio]
              properties:
                audio:
                  type: string
                  format: binary
                  description: Audio file (1-minute chunk)
                chunkIndex:
                  type: integer
                chunkStartSeconds:
                  type: integer
      responses:
        "200":
          description: Chunk processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  chunkIndex:
                    type: integer
                  formData:
                    $ref: "#/components/schemas/RecordingFormData"
                  message:
                    type: string
        "404":
          description: Session not found
        "422":
          description: Empty transcript (silence)

  /api/recording/{sessionId}/photo:
    post:
      tags: [Recording]
      summary: Add a photo to an active recording session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo, audioSeconds]
              properties:
                photo:
                  type: string
                  format: binary
                audioSeconds:
                  type: integer
                  description: Timestamp in the recording when photo was taken
      responses:
        "200":
          description: Photo added
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  filename:
                    type: string
                  audioSeconds:
                    type: integer
                  formData:
                    $ref: "#/components/schemas/RecordingFormData"
        "404":
          description: Session not found

  /api/recording/{sessionId}/finish:
    post:
      tags: [Recording]
      summary: Finish recording session and save as a job
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                address:
                  type: string
                certificateType:
                  type: string
                  enum: [EICR, EIC]
                  default: EICR
                jobData:
                  type: object
                  description: iOS Whisper mode on-device extracted data
                whisperDebugLog:
                  type: object
                  description: Debug log from iOS Whisper mode
      responses:
        "200":
          description: Session saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  jobId:
                    type: string
                  address:
                    type: string
                  formData:
                    $ref: "#/components/schemas/RecordingFormData"
                  message:
                    type: string
        "404":
          description: Session not found

  /api/recording/{sessionId}:
    get:
      tags: [Recording]
      summary: Get current recording session state
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session state
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId:
                    type: string
                  formData:
                    $ref: "#/components/schemas/RecordingFormData"
                  chunksReceived:
                    type: integer
                  photosCount:
                    type: integer
                  startedAt:
                    type: integer
                    description: Unix timestamp in milliseconds
        "404":
          description: Session not found

  /api/recording/extract-transcript:
    post:
      tags: [Recording]
      summary: Extract structured data from pre-transcribed text (WhisperKit mode)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transcript]
              properties:
                transcript:
                  type: string
                  minLength: 10
                sessionId:
                  type: string
                existingData:
                  type: object
