      responses:
        "200":
          description: Extraction successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  formData:
                    $ref: "#/components/schemas/RecordingFormData"
        "400":
          description: Transcript too short

  /api/recording/gemini-extract:
    post:
      tags: [Recording]
      summary: Gemini chunked audio extraction (base64 audio)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, audio]
              properties:
                sessionId:
                  type: string
                audio:
                  type: string
                  description: Base64-encoded audio
                audioMimeType:
                  type: string
                  default: audio/flac
                previousAudio:
                  type: string
                  description: Base64-encoded previous audio for context
                previousAudioMimeType:
                  type: string
                context:
                  type: object
                chunkIndex:
                  type: integer
                chunkDuration:
                  type: number
      responses:
        "200":
          description: Extraction result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  transcript:
                    type: string
                  formData:
                    $ref: "#/components/schemas/RecordingFormData"
        "429":
          description: Rate limited

