        "200":
          description: Calendar disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"

  # ============= Push =============
  /api/push/vapid-key:
    get:
      tags: [Push]
      summary: Get VAPID public key for push subscriptions
      security: []
      responses:
        "200":
          description: VAPID key
          content:
            application/json:
              schema:
                type: object
                properties:
                  publicKey:
                    type: string
        "503":
          description: Push not configured

  /api/push/subscribe:
    post:
      tags: [Push]
      summary: Subscribe to push notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subscription]
              properties:
                subscription:
                  type: object
                  required: [endpoint, keys]
                  properties:
                    endpoint:
                      type: string
                      format: uri
                    keys:
                      type: object
                      required: [p256dh, auth]
                      properties:
                        p256dh:
                          type: string
                        auth:
                          type: string
      responses:
        "200":
          description: Subscription saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "400":
          description: Invalid subscription

  /api/push/unsubscribe:
    post:
      tags: [Push]
      summary: Unsubscribe from push notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpoint]
              properties:
                endpoint:
                  type: string
      responses:
        "200":
          description: Unsubscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "400":
          description: Endpoint required

  # ============= Keys & Proxy =============
  /api/keys:
    get:
      tags: [Keys & Proxy]
      summary: Get API keys for direct iOS-to-service connections
      responses:
        "200":
          description: API keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  deepgram:
                    type: string
                    nullable: true
                  anthropic:
                    type: string
                    nullable: true
                  elevenlabs:
                    type: string
                    nullable: true

  /api/proxy/claude:
    post:
      tags: [Keys & Proxy]
      summary: Proxy Claude Anthropic API calls
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Anthropic Messages API request body
      responses:
        "200":
          description: Proxied response from Anthropic

  /api/proxy/deepgram-tts:
    post:
      tags: [Keys & Proxy]
      summary: Proxy Deepgram TTS calls
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        "200":
          description: MP3 audio
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary

  /api/proxy/elevenlabs-tts:
    post:
      tags: [Keys & Proxy]
      summary: Proxy ElevenLabs TTS calls
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        "200":
          description: MP3 audio
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary

  /api/config/certmate:
    get:
      tags: [Keys & Proxy]
      summary: Get remote config for CertMate iOS app
      security: []
      responses:
        "200":
          description: Remote configuration JSON
          content:
            application/json:
              schema:
                type: object

  # ============= Feedback =============
  /api/feedback/{sessionId}:
    get:
      tags: [Feedback]
      summary: Feedback form HTML page for session optimizer
      security: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: HTML feedback form
          content:
            text/html:
              schema:
                type: string
    post:
      tags: [Feedback]
      summary: Submit feedback for a session optimizer report
      security: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [feedback]
              properties:
                feedback:
                  type: string
      responses:
        "200":
          description: Feedback received (HTML confirmation)
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Session not found

  /api/optimizer-report/{reportId}:
    get:
      tags: [Feedback]
      summary: Serve optimizer report HTML
      security: []
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Report HTML
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Report not found

  /api/optimizer-report/{reportId}/accept:
    post:
      tags: [Feedback]
      summary: Accept selected optimizer recommendations
      security: []
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accepted]
              properties:
                accepted:
                  type: array
                  items:
                    type: integer
                  description: Array of recommendation indices to accept
      responses:
        "200":
          description: Changes queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /api/optimizer-report/{reportId}/reject:
    post:
      tags: [Feedback]
      summary: Reject all optimizer recommendations
      security: []
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Rejection queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"

  /api/optimizer-report/{reportId}/rerun:
    post:
      tags: [Feedback]
      summary: Re-run analysis with additional context
      security: []
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context]
              properties:
                context:
                  type: string
      responses:
        "200":
          description: Re-run queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  # ============= Debug =============
  /api/debug-report:
    post:
      tags: [Debug]
      summary: Upload a debug report from iOS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, issueText]
              properties:
                sessionId:
                  type: string
                issueText:
                  type: string
                  maxLength: 5000
                address:
                  type: string
                jobId:
                  type: string
      responses:
        "200":
          description: Report uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  reportId:
                    type: string

