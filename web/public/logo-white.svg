  <g transform="translate(2,3)" filter="url(#glow)">
    <!-- Speech bubble -->
    <path d="M1.5 6.5C1.5 3.462 3.962 1 7 1H25C28.038 1 30.5 3.462 30.5 6.5V21.5C30.5 24.538 28.038 27 25 27H19L16 32L13 27H7C3.962 27 1.5 24.538 1.5 21.5V6.5Z" fill="url(#iconGrad)" opacity="0.2"/>
