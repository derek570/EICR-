    <!-- Microphone -->
    <rect x="13" y="6" width="6" height="10" rx="3" fill="url(#iconGrad)"/>
    <path d="M10.5 14C10.5 17.314 12.962 19.5 16 19.5C19.038 19.5 21.5 17.314 21.5 14" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <line x1="16" y1="19.5" x2="16" y2="22" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round"/>
