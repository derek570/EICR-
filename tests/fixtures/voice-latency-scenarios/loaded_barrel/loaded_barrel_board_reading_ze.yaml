name: loaded_barrel_board_reading_ze
suite: loaded_barrel
description: |
  Verifies that a single clean board-level Ze utterance extracts
  correctly and that Loaded Barrel's onToolUseStreamed hook fires on
  record_board_reading (opening ElevenLabs pre-synth on
  content_block_stop with circuit=null + boardId='main' slot shape).

  Loop-restoration note (2026-06-17): round-1 early-terminate was
  REMOVED so the agent runs its full multi-round tool loop and decides
  termination itself via end_turn. The board-reading turn therefore
  runs the full loop (round-1 dispatch + a round-2 Sonnet turn that
  returns end_turn), rather than short-circuiting after round 1. This
  is the deliberate latency-for-agency trade-off; single-turn lead time
  is recovered separately by the Loaded Barrel streaming hook.

  Budget reasoning: Ze / earth_loop_impedance_ze is NOT on the
  regex_fast_v2 eligibility whitelist
  (src/extraction/regex-fast-eligibility.js:47-55), so real iOS reaches
  Sonnet for this utterance. With the full loop restored, the audible
  floor is round-1 (~2450 ms best case, 3000-3500 ms median) PLUS the
  round-2 Sonnet wall (~1.4-2.5 s) that early-terminate used to skip on
  this single-clean-write shape.

  Budget set to 6000 ms — the realistic full-loop Sonnet-path ceiling
  post loop-restoration (was 3500 ms under the round-1-only
  early-terminate path that no longer exists). The streamed Loaded
  Barrel pre-synth still lands its confirmation audio inside this
  window; further reduction is Plan B lead-time work, not this path.

  Pre-requisite: VOICE_LATENCY_LOADED_BARREL=true on the task def. Iff
  the speculator is not engaging, the audible budget falls back to
  baseline and this scenario will fail loudly.

job_state:
  boards:
    - id: main
      designation: "DB-1"
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Lighting
      ocpd_rating_a: 6
      ocpd_type: B

transcript:
  - at_ms: 0
    text: "Ze nought point two five."
    isFinal: true

expect:
  extraction_count: { min: 1 }
  # Board-level Ze writes to the board's earth_loop_impedance_ze field;
  # the bundler emits it as a reading on circuit 0 (board-row).
  has_reading:
    - circuit: 0
      field: earth_loop_impedance_ze
      value: "0.25"
  ask_user_count: { max: 0 }
  saw_event_types:
    - extraction
  audible_latency_ms_p50: { max: 6000 }

config:
  timeout_ms: 45000
  drain_ms: 20000
  fetch_tts: true
