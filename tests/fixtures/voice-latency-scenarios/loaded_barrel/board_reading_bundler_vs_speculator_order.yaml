name: board_reading_bundler_vs_speculator_order
suite: loaded_barrel
description: |
  Documents the bundler emit for a single board-level reading under the
  Plan B (2026-06-17) B1a SUPPRESS contract.

  PREVIOUSLY this fixture pinned bundler-BEFORE-speculator ordering: the
  speculator opened a pre-synth on `onToolUseStreamed` (content_block_stop)
  and emitted an `extraction` envelope with `result.mid_stream_preview: true`.
  Plan B B1a SUPPRESSES that mid-stream advertisement entirely (the speculator
  still synthesises + parks the MP3, but never emits the preview), because the
  preview let iOS PLAY speculative audio mid-turn, BEFORE the loop validated —
  the "green flash before the value lands" / wrong-audio-on-a-corrected-turn
  artefact. iOS now learns of the parked audio via the NORMAL canonical
  confirmation POST (post-validate), which claims the parked MP3.

  Pin (post-B1a): the BUNDLER `extraction` envelope arrives and NO
  `extraction:speculator` (mid_stream_preview) envelope is ever sent. If a
  future regression re-introduces the mid-stream preview, the forbid assertion
  below trips.

  Implementation: the `event_ordering` / `forbid_event_tokens` predicates key on
  `extraction:bundler` (no `mid_stream_preview` flag) vs `extraction:speculator`
  (mid_stream_preview === true). Both would arrive as `type: extraction`, so a
  plain saw_event_types check wouldn't distinguish them.

  Pre-requisite: VOICE_LATENCY_LOADED_BARREL=true on the task def (the
  speculator must construct + park the MP3 so the canonical POST can HIT).

job_state:
  boards:
    - id: main
      designation: "DB-1"
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Lighting
      ocpd_rating_a: 6
      ocpd_type: B

transcript:
  - at_ms: 0
    text: "Ze nought point eight six."
    isFinal: true

expect:
  extraction_count: { min: 1 }
  has_reading:
    # Legacy `ze` after validateAndCorrectFields rewrite — see
    # sibling ze_first_time_voice_confirmed.yaml for the rationale.
    - circuit: 0
      field: ze
      value: "0.86"
  ask_user_count: { max: 0 }
  # Post-B1a: the bundler envelope arrives; the mid-stream speculator
  # preview is suppressed. Pin the bundler emit and FORBID the preview.
  event_ordering:
    - extraction:bundler
  forbid_event_tokens:
    - extraction:speculator
  # The first TTS fetch serves the bundler's confirmation (which claims the
  # parked MP3 on a HIT, or synthesises fresh on a MISS). Min 1 safety net.
  tts_fetch_count: { min: 1 }

config:
  timeout_ms: 30000
  drain_ms: 15000
  fetch_tts: true
