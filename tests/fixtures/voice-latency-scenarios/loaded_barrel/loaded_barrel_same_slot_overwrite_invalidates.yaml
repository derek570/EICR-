name: loaded_barrel_same_slot_overwrite_invalidates
suite: loaded_barrel
description: |
  Same-turn correction. Inspector says "Circuit one points five, no
  six". Sonnet may emit two record_reading tool_use calls in a single
  round with the same (field=number_of_points, circuit=1, boardId=null)
  slot. Per plan §B, the second write triggers patch.readings.overwritten
  for the same key — the speculator invalidates the first cached
  entry and starts a new speculation for value=6.

  Pin: only ONE audible confirmation for this slot ("Circuit 1,
  number of points six"). The cached "five" buffer is discarded.

  Difference vs clear_invalidates: same-turn (no second utterance,
  no second extraction). Tests the read.readings.overwritten path
  specifically.

job_state:
  boards:
    - id: main
      designation: "DB-1"
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Lighting
      ocpd_rating_a: 6
      ocpd_type: B

transcript:
  - at_ms: 0
    text: "Circuit one number of points five, no, six."
    isFinal: true

expect:
  extraction_count: { min: 1 }
  has_reading:
    - circuit: 1
      field: number_of_points
      value: 6
  ask_user_count: { max: 0 }
  saw_event_types:
    - extraction
  audible_latency_ms_p50: { max: 2500 }

config:
  timeout_ms: 45000
  drain_ms: 20000
  fetch_tts: true
