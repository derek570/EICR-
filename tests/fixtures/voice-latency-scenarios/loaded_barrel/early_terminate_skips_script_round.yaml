name: early_terminate_skips_script_round
suite: loaded_barrel
description: |
  Pins the dialogue-engine ask-emission invariant against future
  early-terminate refactors. The 2026-05-28 widening
  (stage6-early-terminate.js) allows N≥1 record_reading /
  record_board_reading turns to terminate after round 1. A turn that
  emits `start_dialogue_script` MUST NOT early-terminate; round 2
  has to run so the script's first ask can land on the wire.

  Today the dialogue engine pre-empts on the RCD trigger before
  Sonnet runs (engine.js processDialogueTurn → detectEntry →
  runEntry → buildScriptAsk emitted directly), so early-terminate
  doesn't actually gate the ask emission for this transcript. But
  a future refactor that routes script entry through Sonnet's
  `start_dialogue_script` tool would re-introduce the dependency —
  this scenario surfaces the invariant either way.

  Codex review 2026-06-01: dropped `extraction_count: { min: 1 }`
  because a trigger-only RCD utterance emits ONLY an
  `ask_user_started` frame — no value is written, so no extraction
  envelope is sent. The ask emission itself is the observable proxy
  for "round 2 ran".

job_state:
  boards:
    - id: main
      designation: "DB-1"
      board_type: main
  circuits:
    - number: 3
      board_id: main
      designation: Cooker
      ocpd_rating_a: 32
      ocpd_type: B

transcript:
  - at_ms: 0
    text: "RCD on circuit 3."
    isFinal: true

expect:
  # The trigger-only utterance has no values to write, so no
  # extraction envelope arrives. The engine emits ONE ask
  # (rcd_bs_en) — that's the regression guard. A future refactor
  # that ate round 2 would drop the ask to zero.
  ask_user_count: { min: 1, max: 1 }
  ask_user:
    - field: rcd_bs_en
      text_matches: "BS number"

config:
  timeout_ms: 30000
  drain_ms: 15000
  fetch_tts: false
