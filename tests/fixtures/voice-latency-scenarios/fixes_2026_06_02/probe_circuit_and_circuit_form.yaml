name: probe_circuit_and_circuit_form
suite: fixes_2026_06_02
description: |
  Fix C2 PROBE — "circuit N and circuit M" repeating-noun form.
  Distinct from "circuits N and M" plural-noun form. Handoff §C2 noted
  this shape is NOT caught by BROADCAST_LIST_RE (which requires
  "circuits" plural before the digit list); tests whether Sonnet's
  prompt-driven fan-out still handles it.

job_state:
  boards:
    - id: main
      designation: "DB Main"
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Lighting
      ocpd_rating_a: 6
    - number: 2
      board_id: main
      designation: Sockets
      ocpd_rating_a: 32
    - number: 3
      board_id: main
      designation: Cooker
      ocpd_rating_a: 32

transcript:
  - at_ms: 0
    text: "Polarity confirmed for circuit 2 and circuit 3."
    isFinal: true

expect:
  extraction_count: { min: 1 }
  has_reading:
    - circuit: 2
      field: polarity
      value: "Y"
    - circuit: 3
      field: polarity
      value: "Y"

config:
  timeout_ms: 45000
  drain_ms: 15000
  fetch_tts: false
