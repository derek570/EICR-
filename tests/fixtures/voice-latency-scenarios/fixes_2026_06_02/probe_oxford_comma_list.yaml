name: probe_oxford_comma_list
suite: fixes_2026_06_02
description: |
  Fix C2 PROBE — Oxford comma list form ("circuits 2, 3, and 4").
  Tests whether the syntactic shape affects Sonnet's fan-out reliability.

  Also tests BROADCAST_LIST_RE regex coverage in circuit-range.js.

job_state:
  boards:
    - id: main
      designation: "DB Main"
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Lighting
      ocpd_rating_a: 6
    - number: 2
      board_id: main
      designation: Sockets
      ocpd_rating_a: 32
    - number: 3
      board_id: main
      designation: Cooker
      ocpd_rating_a: 32
    - number: 4
      board_id: main
      designation: Shower
      ocpd_rating_a: 40

transcript:
  - at_ms: 0
    text: "Polarity confirmed for circuits 2, 3, and 4."
    isFinal: true

expect:
  extraction_count: { min: 1 }
  has_reading:
    - circuit: 2
      field: polarity
      value: "Y"
    - circuit: 3
      field: polarity
      value: "Y"
    - circuit: 4
      field: polarity
      value: "Y"

config:
  timeout_ms: 45000
  drain_ms: 15000
  fetch_tts: false
