name: probe_clear_plus_record_different_field
suite: speculator_races
description: |
  REGRESSION GUARD — clear + record different field same turn.
  Existing `loaded_barrel_clear_invalidates.yaml` covers same-field
  clear + re-record. Cross-field uncovered.

  Inspector explicitly clears polarity then writes R1+R2 in one
  turn. Sonnet emits `clear_reading(polarity_confirmed) +
  record_reading(r1_r2_ohm=0.42)`.

  PROD OBSERVATION 2026-06-02: After turn, only r1_plus_r2 reading
  appears. polarity is gone (clear successful). Verifies clear-then-
  write on different fields works.

  Speculator perspective: polarity_confirmed slot is invalidated via
  onSnapshotPatch's `patch.cleared` iteration → invalidateBySlot. So
  any speculation on polarity_confirmed is aborted before audio
  ships. r1_plus_r2 speculation runs independently.

job_state:
  boards:
    - id: main
      designation: "DB-1"
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Cooker
      ocpd_rating_a: 32
      polarity_confirmed: "Y"  # pre-existing — Sonnet will clear

transcript:
  - at_ms: 0
    text: "Clear polarity on circuit 1. R1 plus R2 is point four two."
    isFinal: true

expect:
  extraction_count: { min: 1 }
  has_reading:
    - circuit: 1
      field: r1_plus_r2
      value: "0.42"
  # Polarity must be absent — the clear succeeded.
  has_no_reading:
    - circuit: 1
      field: polarity
      value: "Y"
    - circuit: 1
      field: polarity_confirmed
      value: "Y"

config:
  timeout_ms: 30000
  drain_ms: 15000
  fetch_tts: false
