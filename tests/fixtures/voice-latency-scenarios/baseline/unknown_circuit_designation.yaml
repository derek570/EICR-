name: unknown_circuit_designation
suite: baseline
description: |
  Negative control: inspector dictates a reading against a designation
  that doesn't exist in the schedule. Sonnet SHOULD ask "which circuit
  number?" — NOT silently invent a circuit, NOT silently drop the
  value.

  Pins the upper boundary of designation resolution: when the named
  load isn't in the schedule and isn't a verbatim match for any
  existing designation, the right answer is ask_user, not guess.

job_state:
  boards:
    - id: main
      designation: "DB-1"
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Cooker
      ocpd_rating_a: 32
      ocpd_type: B

transcript:
  - at_ms: 0
    text: "Zs for the kitchen ring is 0.5."
    isFinal: true

expect:
  extraction_count: { min: 1 }
  ask_user_count: { min: 1 }
  saw_event_types:
    - extraction

config:
  timeout_ms: 30000
  drain_ms: 15000
  fetch_tts: false
