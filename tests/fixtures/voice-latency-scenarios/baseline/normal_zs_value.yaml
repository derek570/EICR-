name: normal_zs_value
suite: baseline
description: |
  Decimal Zs value extraction. Inspector says "circuit two Zs nought
  point thirty eight ohms" — Sonnet should extract measured_zs_ohm=0.38
  on circuit 2.

job_state:
  boards:
    - id: main
      designation: "DB-1"
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Lighting
      ocpd_rating_a: 6
      ocpd_type: B
    - number: 2
      board_id: main
      designation: Sockets
      ocpd_rating_a: 32
      ocpd_type: B

transcript:
  - at_ms: 0
    text: "Circuit two Zs nought point thirty eight ohms."
    isFinal: true

expect:
  extraction_count: { min: 1 }
  has_reading:
    # Backend wire shape uses short field name `zs` (not canonical
    # measured_zs_ohm). Value comes back as string "0.38".
    - circuit: 2
      field: zs
      value: "0.38"
  ask_user_count: { max: 0 }
  audible_latency_ms_p50: { max: 6000 }

config:
  timeout_ms: 45000
  drain_ms: 20000
  fetch_tts: true
