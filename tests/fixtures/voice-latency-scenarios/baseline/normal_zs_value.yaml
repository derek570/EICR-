name: normal_zs_value
suite: baseline
description: |
  Decimal Zs value extraction. Inspector says "circuit two Zs nought
  point thirty eight ohms" — Sonnet should extract measured_zs_ohm=0.38
  on circuit 2.

job_state:
  boards:
    - id: main
      designation: Main DB
      circuits:
        - number: 1
          designation: Lighting
          ocpd_rating: 6
          ocpd_type: B
        - number: 2
          designation: Sockets
          ocpd_rating: 32
          ocpd_type: B

transcript:
  - at_ms: 0
    text: "Circuit two Zs nought point thirty eight ohms."
    isFinal: true

expect:
  extraction_count: { min: 1 }
  has_reading:
    - circuit: 2
      field: measured_zs_ohm
      value: 0.38
  ask_user_count: { max: 0 }
  audible_latency_ms_p50: { max: 6000 }

config:
  timeout_ms: 25000
  drain_ms: 6000
  fetch_tts: true
