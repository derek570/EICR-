# ============================================================================
# LIVE-LANE ADVISORY PROBE — NOT part of the deterministic mock/CI lane.
# Needs a real Anthropic model (Stage 6 live tool loop) and is ADVISORY:
# it pins prompt BEHAVIOUR (D2 ambiguous C2/C3 severity clarification,
# field-feedback-2026-07-14), so a failure is a prompt regression signal,
# not a hard gate. The `lane: live-advisory` tag makes --scenario-dir
# discovery skip this file unless --lane=live-advisory is passed.
#
# Run with:
#   node scripts/voice-latency-bench/transcript-replay-direct.mjs --loaded-barrel=off \
#     --scenario-dir=tests/fixtures/voice-latency-scenarios/live_advisory --lane=live-advisory
# ============================================================================
name: d2_clearcut_live_parts_no_ask
suite: live_advisory
lane: live-advisory
description: |
  D2 clear-cut guard probe (Codex r1-#6, BPG4 danger-present): accessible
  exposed live parts stated UP-FRONT must commit C1 with NO severity ask —
  asking about a present danger delays a C1, and a C2 assertion here would
  pin an unsafe code.

job_state:
  boards:
    - id: main
      designation: "DB-1"
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Upstairs sockets

transcript:
  - at_ms: 0
    text: "Observation that the socket in the upstairs bedroom is cracked with live parts exposed."
    isFinal: true

expect:
  ask_user_count: { max: 0 }
  tool_call_sequence:
    - tool: record_observation
  observations:
    - final: true
      code: C1

config:
  timeout_ms: 60000
  drain_ms: 15000
  fetch_tts: false
