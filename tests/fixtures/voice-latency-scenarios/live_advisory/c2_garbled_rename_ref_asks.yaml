name: c2_garbled_rename_ref_asks
suite: live_advisory
lane: live-advisory
description: |
  C2 pin (F2): a rename whose target ref arrives as a NON-NUMERIC garble
  ("second floor" for "circuit four") with no unambiguous designation match
  must ASK — never rename a nearby ref.

job_state:
  boards:
    - id: main
      designation: "DB-1"
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Upstairs Lights
    - number: 2
      board_id: main
      designation: Water Heater

transcript:
  - at_ms: 0
    text: "Rename second floor to the landing lights."
    isFinal: true

expect:
  ask_user_count: { min: 1 }
  forbid_tools:
    - rename_circuit

config:
  timeout_ms: 60000
  drain_ms: 15000
  fetch_tts: false
