# ============================================================================
# LIVE-LANE ADVISORY PROBE (Codex r2-#5 — C1/C2/C3 prompt-steering pins,
# field-feedback-2026-07-14). Needs a real model; advisory, not a hard gate.
# Run with:
#   node scripts/voice-latency-bench/transcript-replay-direct.mjs --loaded-barrel=off \
#     --scenario=tests/fixtures/voice-latency-scenarios/live_advisory/<this file>
# ============================================================================
name: c1_unmatched_designation_asks
suite: live_advisory
lane: live-advisory
description: |
  C1 pin: a READING aimed at a designation matching NO circuit, with no
  explicit ref, is usually a garble of an existing name — the model must
  ASK (ambiguous_circuit), never guess a nearby circuit and NEVER mint a
  phantom circuit.

job_state:
  boards:
    - id: main
      designation: "DB-1"
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Upstairs Lights
    - number: 2
      board_id: main
      designation: Water Heater

transcript:
  - at_ms: 0
    text: "R1 plus R2 for the auto feature is nought point four."
    isFinal: true

expect:
  ask_user_count: { min: 1 }
  forbid_tools:
    - create_circuit
    - record_reading

config:
  timeout_ms: 60000
  drain_ms: 15000
  fetch_tts: false
