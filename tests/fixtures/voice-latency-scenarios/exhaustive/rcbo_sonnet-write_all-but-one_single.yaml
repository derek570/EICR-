name: rcbo_sonnet-write_all-but-one_single
suite: exhaustive
description: >-
  RCBO SONNET-WRITE all-but-one value scenario for circuit 3.

  The entry transcript avoids dialogue trigger words; Sonnet writes the volunteered slot values and
  tryEnterScriptFromWrites either enters the single-circuit script or skips multi-circuit batch
  writes.

  RCBO BS mirroring is state-only here: rcd_bs_en must not appear as an extracted reading unless
  Sonnet explicitly writes it.
job_state:
  boards:
    - id: main
      designation: DB-1
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Lighting
      ocpd_rating_a: 6
      ocpd_type: B
    - number: 2
      board_id: main
      designation: Kitchen Sockets
      ocpd_rating_a: 32
      ocpd_type: B
    - number: 3
      board_id: main
      designation: Cooker
      ocpd_rating_a: 32
      ocpd_type: B
    - number: 4
      board_id: main
      designation: Shower
      ocpd_rating_a: 40
      ocpd_type: B
    - number: 5
      board_id: main
      designation: Outside Lights
      ocpd_rating_a: 6
      ocpd_type: B
transcript:
  - at_ms: 0
    text: >-
      For circuit 3, overcurrent standard BS EN 61009, curve B, 32 amps, residual type A, residual
      current 30 mA.
    isFinal: true
  - at_ms: 7000
    text: 6 kA.
    isFinal: true
expect:
  extraction_count:
    min: 1
  has_reading:
    - circuit: 3
      field: ocpd_bs_en
      value: BS EN 61009
    - circuit: 3
      field: ocpd_type
      value: B
    - circuit: 3
      field: ocpd_rating
      value: "32"
    - circuit: 3
      field: rcd_type
      value: A
    - circuit: 3
      field: rcd_operating_current_ma
      value: "30"
    - circuit: 3
      field: ocpd_breaking_capacity_ka
      value: "6"
  has_no_reading:
    - circuit: 1
      field: ocpd_bs_en
      value: BS EN 61009
    - circuit: 1
      field: ocpd_type
      value: B
    - circuit: 1
      field: ocpd_rating
      value: "32"
    - circuit: 1
      field: rcd_type
      value: A
    - circuit: 1
      field: rcd_operating_current_ma
      value: "30"
    - circuit: 1
      field: ocpd_breaking_capacity_ka
      value: "6"
    - circuit: 2
      field: ocpd_bs_en
      value: BS EN 61009
    - circuit: 2
      field: ocpd_type
      value: B
    - circuit: 2
      field: ocpd_rating
      value: "32"
    - circuit: 2
      field: rcd_type
      value: A
    - circuit: 2
      field: rcd_operating_current_ma
      value: "30"
    - circuit: 2
      field: ocpd_breaking_capacity_ka
      value: "6"
    - circuit: 4
      field: ocpd_bs_en
      value: BS EN 61009
    - circuit: 4
      field: ocpd_type
      value: B
    - circuit: 4
      field: ocpd_rating
      value: "32"
    - circuit: 4
      field: rcd_type
      value: A
    - circuit: 4
      field: rcd_operating_current_ma
      value: "30"
    - circuit: 4
      field: ocpd_breaking_capacity_ka
      value: "6"
    - circuit: 5
      field: ocpd_bs_en
      value: BS EN 61009
    - circuit: 5
      field: ocpd_type
      value: B
    - circuit: 5
      field: ocpd_rating
      value: "32"
    - circuit: 5
      field: rcd_type
      value: A
    - circuit: 5
      field: rcd_operating_current_ma
      value: "30"
    - circuit: 5
      field: ocpd_breaking_capacity_ka
      value: "6"
    - circuit: 3
      field: rcd_bs_en
      value: BS EN 61009
  ask_user_count:
    min: 1
    max: 1
  ask_user:
    - field: ocpd_breaking_capacity_ka
      text_matches: breaking capacity
config:
  timeout_ms: 70000
  drain_ms: 25000
  fetch_tts: false
