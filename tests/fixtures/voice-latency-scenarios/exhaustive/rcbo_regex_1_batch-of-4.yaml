name: rcbo_regex_1_batch-of-4
suite: exhaustive
description: >-
  RCBO REGEX broadcast guard scenario for circuits 1 through 4.

  The trigger words are present, but detectBroadcastIntent must bail before script entry so Sonnet
  performs the batch write and no script ask fires.

  RCBO BS mirroring is state-only here: rcd_bs_en must not appear as an extracted reading unless
  Sonnet explicitly writes it.
job_state:
  boards:
    - id: main
      designation: DB-1
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Lighting
    - number: 2
      board_id: main
      designation: Kitchen Sockets
    - number: 3
      board_id: main
      designation: Cooker
    - number: 4
      board_id: main
      designation: Shower
    - number: 5
      board_id: main
      designation: Outside Lights
transcript:
  - at_ms: 0
    text: RCBO BS EN 61009 for circuits 1 through 4.
    isFinal: true
expect:
  extraction_count:
    min: 1
  has_reading:
    - circuit: 1
      field: ocpd_bs_en
      value: BS EN 61009
    - circuit: 2
      field: ocpd_bs_en
      value: BS EN 61009
    - circuit: 3
      field: ocpd_bs_en
      value: BS EN 61009
    - circuit: 4
      field: ocpd_bs_en
      value: BS EN 61009
  has_no_reading:
    - circuit: 5
      field: ocpd_bs_en
      value: BS EN 61009
    - circuit: 1
      field: ocpd_type
    - circuit: 2
      field: ocpd_type
    - circuit: 3
      field: ocpd_type
    - circuit: 4
      field: ocpd_type
    - circuit: 1
      field: ocpd_rating
    - circuit: 2
      field: ocpd_rating
    - circuit: 3
      field: ocpd_rating
    - circuit: 4
      field: ocpd_rating
    - circuit: 1
      field: ocpd_breaking_capacity
    - circuit: 2
      field: ocpd_breaking_capacity
    - circuit: 3
      field: ocpd_breaking_capacity
    - circuit: 4
      field: ocpd_breaking_capacity
    - circuit: 1
      field: rcd_type
    - circuit: 2
      field: rcd_type
    - circuit: 3
      field: rcd_type
    - circuit: 4
      field: rcd_type
    - circuit: 1
      field: rcd_operating_current_ma
    - circuit: 2
      field: rcd_operating_current_ma
    - circuit: 3
      field: rcd_operating_current_ma
    - circuit: 4
      field: rcd_operating_current_ma
    - circuit: 1
      field: rcd_bs_en
      value: BS EN 61009
    - circuit: 2
      field: rcd_bs_en
      value: BS EN 61009
    - circuit: 3
      field: rcd_bs_en
      value: BS EN 61009
    - circuit: 4
      field: rcd_bs_en
      value: BS EN 61009
  ask_user_count:
    min: 0
    max: 0
  confirmation_count:
    min: 1
  confirmation_text_contains:
    - Circuits 1 to 4
config:
  timeout_ms: 45000
  drain_ms: 20000
  fetch_tts: false
