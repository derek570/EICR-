name: rcd_sonnet-write_2_batch-of-4
suite: exhaustive
description: >-
  RCD SONNET-WRITE 2 value scenario for circuits 1 through 4.

  The entry transcript avoids dialogue trigger words; Sonnet writes the volunteered slot values and
  tryEnterScriptFromWrites either enters the single-circuit script or skips multi-circuit batch
  writes.
job_state:
  boards:
    - id: main
      designation: DB-1
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Lighting
    - number: 2
      board_id: main
      designation: Kitchen Sockets
    - number: 3
      board_id: main
      designation: Cooker
    - number: 4
      board_id: main
      designation: Shower
    - number: 5
      board_id: main
      designation: Outside Lights
transcript:
  - at_ms: 0
    text: trip time 25 ms, BS EN 61008 for circuits 1 through 4.
    isFinal: true
expect:
  extraction_count:
    min: 1
  has_reading:
    - circuit: 1
      field: rcd_trip_time
      value: "25"
    - circuit: 1
      field: rcd_bs_en
      value: BS EN 61008
    - circuit: 2
      field: rcd_trip_time
      value: "25"
    - circuit: 2
      field: rcd_bs_en
      value: BS EN 61008
    - circuit: 3
      field: rcd_trip_time
      value: "25"
    - circuit: 3
      field: rcd_bs_en
      value: BS EN 61008
    - circuit: 4
      field: rcd_trip_time
      value: "25"
    - circuit: 4
      field: rcd_bs_en
      value: BS EN 61008
  has_no_reading:
    - circuit: 5
      field: rcd_trip_time
      value: "25"
    - circuit: 5
      field: rcd_bs_en
      value: BS EN 61008
    - circuit: 1
      field: rcd_type
    - circuit: 2
      field: rcd_type
    - circuit: 3
      field: rcd_type
    - circuit: 4
      field: rcd_type
    - circuit: 1
      field: rcd_operating_current_ma
    - circuit: 2
      field: rcd_operating_current_ma
    - circuit: 3
      field: rcd_operating_current_ma
    - circuit: 4
      field: rcd_operating_current_ma
  ask_user_count:
    min: 0
    max: 0
  confirmation_count:
    min: 2
  confirmation_text_contains:
    - Circuits 1 to 4
config:
  timeout_ms: 45000
  drain_ms: 20000
  fetch_tts: false
