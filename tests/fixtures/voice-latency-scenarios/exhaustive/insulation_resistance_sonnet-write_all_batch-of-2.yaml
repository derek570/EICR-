name: insulation_resistance_sonnet-write_all_batch-of-2
suite: exhaustive
description: >-
  Insulation resistance SONNET-WRITE all value scenario for circuits 2 and 3.

  The entry transcript avoids dialogue trigger words; Sonnet writes the volunteered slot values and
  tryEnterScriptFromWrites either enters the single-circuit script or skips multi-circuit batch
  writes.
job_state:
  boards:
    - id: main
      designation: DB-1
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Lighting
      ocpd_rating_a: 6
      ocpd_type: B
    - number: 2
      board_id: main
      designation: Kitchen Sockets
      ocpd_rating_a: 32
      ocpd_type: B
    - number: 3
      board_id: main
      designation: Cooker
      ocpd_rating_a: 32
      ocpd_type: B
    - number: 4
      board_id: main
      designation: Shower
      ocpd_rating_a: 40
      ocpd_type: B
    - number: 5
      board_id: main
      designation: Outside Lights
      ocpd_rating_a: 6
      ocpd_type: B
transcript:
  - at_ms: 0
    text: >-
      L to L greater than 200 megohms, L to E greater than 299 megohms, test voltage
      500 volts for circuits 2 and 3.
    isFinal: true
expect:
  extraction_count:
    min: 1
  has_reading:
    - circuit: 2
      field: insulation_resistance_l_l
      value: ">200"
    - circuit: 2
      field: insulation_resistance_l_e
      value: ">299"
    - circuit: 2
      field: ir_test_voltage
      value: "500"
    - circuit: 3
      field: insulation_resistance_l_l
      value: ">200"
    - circuit: 3
      field: insulation_resistance_l_e
      value: ">299"
    - circuit: 3
      field: ir_test_voltage
      value: "500"
  has_no_reading:
    - circuit: 1
      field: insulation_resistance_l_l
      value: ">200"
    - circuit: 1
      field: insulation_resistance_l_e
      value: ">299"
    - circuit: 1
      field: ir_test_voltage
      value: "500"
    - circuit: 4
      field: insulation_resistance_l_l
      value: ">200"
    - circuit: 4
      field: insulation_resistance_l_e
      value: ">299"
    - circuit: 4
      field: ir_test_voltage
      value: "500"
    - circuit: 5
      field: insulation_resistance_l_l
      value: ">200"
    - circuit: 5
      field: insulation_resistance_l_e
      value: ">299"
    - circuit: 5
      field: ir_test_voltage
      value: "500"
  ask_user_count:
    min: 0
    max: 0
  confirmation_count:
    min: 3
  confirmation_text_contains:
    - Circuits 2, 3
config:
  timeout_ms: 45000
  drain_ms: 20000
  fetch_tts: false
