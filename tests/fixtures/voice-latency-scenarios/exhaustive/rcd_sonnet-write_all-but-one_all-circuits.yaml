name: rcd_sonnet-write_all-but-one_all-circuits
suite: exhaustive
description: >-
  RCD SONNET-WRITE all-but-one value scenario for all circuits.

  The entry transcript avoids dialogue trigger words; Sonnet writes the volunteered slot values and
  tryEnterScriptFromWrites either enters the single-circuit script or skips multi-circuit batch
  writes.
job_state:
  boards:
    - id: main
      designation: DB-1
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Lighting
      ocpd_rating_a: 6
      ocpd_type: B
    - number: 2
      board_id: main
      designation: Kitchen Sockets
      ocpd_rating_a: 32
      ocpd_type: B
    - number: 3
      board_id: main
      designation: Cooker
      ocpd_rating_a: 32
      ocpd_type: B
    - number: 4
      board_id: main
      designation: Shower
      ocpd_rating_a: 40
      ocpd_type: B
transcript:
  - at_ms: 0
    text: trip time 25 ms, BS EN 61008, type AC for all circuits.
    isFinal: true
expect:
  extraction_count:
    min: 1
  has_reading:
    - circuit: 1
      field: rcd_trip_time
      value: "25"
    - circuit: 1
      field: rcd_bs_en
      value: BS EN 61008
    - circuit: 1
      field: rcd_type
      value: AC
    - circuit: 2
      field: rcd_trip_time
      value: "25"
    - circuit: 2
      field: rcd_bs_en
      value: BS EN 61008
    - circuit: 2
      field: rcd_type
      value: AC
    - circuit: 3
      field: rcd_trip_time
      value: "25"
    - circuit: 3
      field: rcd_bs_en
      value: BS EN 61008
    - circuit: 3
      field: rcd_type
      value: AC
    - circuit: 4
      field: rcd_trip_time
      value: "25"
    - circuit: 4
      field: rcd_bs_en
      value: BS EN 61008
    - circuit: 4
      field: rcd_type
      value: AC
  has_no_reading:
    - circuit: 1
      field: rcd_operating_current_ma
    - circuit: 2
      field: rcd_operating_current_ma
    - circuit: 3
      field: rcd_operating_current_ma
    - circuit: 4
      field: rcd_operating_current_ma
  ask_user_count:
    min: 0
    max: 0
  confirmation_count:
    min: 3
    max: 3
  confirmation_text_contains:
    - All circuits
  forbid_event_tokens:
    - extraction:speculator
config:
  timeout_ms: 45000
  drain_ms: 20000
  fetch_tts: false
