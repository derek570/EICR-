name: insulation_resistance_regex_2_single
suite: exhaustive
description: >-
  Insulation resistance REGEX 2 value walk-through for circuit 3.

  Dialogue-engine trigger pre-empts Sonnet, harvests entry values with the schema named extractors,
  and asks only for remaining script slots.
job_state:
  boards:
    - id: main
      designation: DB-1
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Lighting
      ocpd_rating_a: 6
      ocpd_type: B
    - number: 2
      board_id: main
      designation: Kitchen Sockets
      ocpd_rating_a: 32
      ocpd_type: B
    - number: 3
      board_id: main
      designation: Cooker
      ocpd_rating_a: 32
      ocpd_type: B
    - number: 4
      board_id: main
      designation: Shower
      ocpd_rating_a: 40
      ocpd_type: B
    - number: 5
      board_id: main
      designation: Outside Lights
      ocpd_rating_a: 6
      ocpd_type: B
transcript:
  - at_ms: 0
    text: >-
      Insulation resistance on circuit 3, live to live 200 megohms, live to earth greater than 299
      megohms.
    isFinal: true
  - at_ms: 7000
    text: 500 volts.
    isFinal: true
expect:
  extraction_count:
    min: 1
  has_reading:
    - circuit: 3
      field: ir_live_live_mohm
      value: "200"
    - circuit: 3
      field: ir_live_earth_mohm
      value: ">299"
    - circuit: 3
      field: ir_test_voltage_v
      value: "500"
  has_no_reading:
    - circuit: 1
      field: ir_live_live_mohm
      value: "200"
    - circuit: 1
      field: ir_live_earth_mohm
      value: ">299"
    - circuit: 1
      field: ir_test_voltage_v
      value: "500"
    - circuit: 2
      field: ir_live_live_mohm
      value: "200"
    - circuit: 2
      field: ir_live_earth_mohm
      value: ">299"
    - circuit: 2
      field: ir_test_voltage_v
      value: "500"
    - circuit: 4
      field: ir_live_live_mohm
      value: "200"
    - circuit: 4
      field: ir_live_earth_mohm
      value: ">299"
    - circuit: 4
      field: ir_test_voltage_v
      value: "500"
    - circuit: 5
      field: ir_live_live_mohm
      value: "200"
    - circuit: 5
      field: ir_live_earth_mohm
      value: ">299"
    - circuit: 5
      field: ir_test_voltage_v
      value: "500"
  ask_user_count:
    min: 1
    max: 1
  ask_user:
    - field: ir_test_voltage_v
      text_matches: test voltage
config:
  timeout_ms: 70000
  drain_ms: 25000
  fetch_tts: false
