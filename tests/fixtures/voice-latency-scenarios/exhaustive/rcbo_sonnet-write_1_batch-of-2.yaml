name: rcbo_sonnet-write_1_batch-of-2
suite: exhaustive
description: >-
  RCBO SONNET-WRITE 1 value scenario for circuits 2 and 3.

  The entry transcript avoids dialogue trigger words; Sonnet writes the volunteered slot values and
  tryEnterScriptFromWrites either enters the single-circuit script or skips multi-circuit batch
  writes.

  RCBO BS mirroring is state-only here: rcd_bs_en must not appear as an extracted reading unless
  Sonnet explicitly writes it.
job_state:
  boards:
    - id: main
      designation: DB-1
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Lighting
      ocpd_rating_a: 6
      ocpd_type: B
    - number: 2
      board_id: main
      designation: Kitchen Sockets
      ocpd_rating_a: 32
      ocpd_type: B
    - number: 3
      board_id: main
      designation: Cooker
      ocpd_rating_a: 32
      ocpd_type: B
    - number: 4
      board_id: main
      designation: Shower
      ocpd_rating_a: 40
      ocpd_type: B
    - number: 5
      board_id: main
      designation: Outside Lights
      ocpd_rating_a: 6
      ocpd_type: B
transcript:
  - at_ms: 0
    text: overcurrent standard BS EN 61009 for circuits 2 and 3.
    isFinal: true
expect:
  extraction_count:
    min: 1
  has_reading:
    - circuit: 2
      field: ocpd_bs_en
      value: BS EN 61009
    - circuit: 3
      field: ocpd_bs_en
      value: BS EN 61009
  has_no_reading:
    - circuit: 1
      field: ocpd_bs_en
      value: BS EN 61009
    - circuit: 4
      field: ocpd_bs_en
      value: BS EN 61009
    - circuit: 5
      field: ocpd_bs_en
      value: BS EN 61009
    - circuit: 2
      field: ocpd_type
    - circuit: 3
      field: ocpd_type
    - circuit: 2
      field: ocpd_rating
    - circuit: 3
      field: ocpd_rating
    - circuit: 2
      field: ocpd_breaking_capacity
    - circuit: 3
      field: ocpd_breaking_capacity
    - circuit: 2
      field: rcd_type
    - circuit: 3
      field: rcd_type
    - circuit: 2
      field: rcd_operating_current_ma
    - circuit: 3
      field: rcd_operating_current_ma
    - circuit: 2
      field: rcd_bs_en
      value: BS EN 61009
    - circuit: 3
      field: rcd_bs_en
      value: BS EN 61009
  ask_user_count:
    min: 0
    max: 0
  confirmation_count:
    min: 1
    max: 1
  confirmation_text_contains:
    - Circuits 2, 3
  forbid_event_tokens:
    - extraction:speculator
config:
  timeout_ms: 45000
  drain_ms: 20000
  fetch_tts: false
