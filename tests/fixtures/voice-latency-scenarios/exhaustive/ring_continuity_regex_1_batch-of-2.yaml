name: ring_continuity_regex_1_batch-of-2
suite: exhaustive
description: >-
  Ring continuity REGEX broadcast guard scenario for circuits 2 and 3.

  The trigger words are present, but detectBroadcastIntent must bail before script entry so Sonnet
  performs the batch write and no script ask fires.
job_state:
  boards:
    - id: main
      designation: DB-1
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Lighting
      ocpd_rating_a: 6
      ocpd_type: B
    - number: 2
      board_id: main
      designation: Kitchen Sockets
      ocpd_rating_a: 32
      ocpd_type: B
    - number: 3
      board_id: main
      designation: Cooker
      ocpd_rating_a: 32
      ocpd_type: B
    - number: 4
      board_id: main
      designation: Shower
      ocpd_rating_a: 40
      ocpd_type: B
    - number: 5
      board_id: main
      designation: Outside Lights
      ocpd_rating_a: 6
      ocpd_type: B
transcript:
  - at_ms: 0
    text: Ring continuity lives 0.43 ohms for circuits 2 and 3.
    isFinal: true
expect:
  extraction_count:
    min: 1
  has_reading:
    - circuit: 2
      field: ring_continuity_r1
      value: "0.43"
    - circuit: 3
      field: ring_continuity_r1
      value: "0.43"
  has_no_reading:
    - circuit: 1
      field: ring_continuity_r1
      value: "0.43"
    - circuit: 4
      field: ring_continuity_r1
      value: "0.43"
    - circuit: 5
      field: ring_continuity_r1
      value: "0.43"
    - circuit: 2
      field: ring_continuity_rn
    - circuit: 3
      field: ring_continuity_rn
    - circuit: 2
      field: ring_continuity_r2
    - circuit: 3
      field: ring_continuity_r2
  ask_user_count:
    min: 0
    max: 0
  confirmation_count:
    min: 1
  confirmation_text_contains:
    - Circuits 2, 3
config:
  timeout_ms: 45000
  drain_ms: 20000
  fetch_tts: false
