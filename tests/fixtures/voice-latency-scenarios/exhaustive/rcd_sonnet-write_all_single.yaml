name: rcd_sonnet-write_all_single
suite: exhaustive
description: >-
  RCD SONNET-WRITE all value scenario for circuit 3.

  The entry transcript avoids dialogue trigger words; Sonnet writes the volunteered slot values and
  tryEnterScriptFromWrites either enters the single-circuit script or skips multi-circuit batch
  writes.

  All RCD device fields filled should transition to the postCompletionAsk bulk-apply prompt.
job_state:
  boards:
    - id: main
      designation: DB-1
      board_type: main
  circuits:
    - number: 1
      board_id: main
      designation: Lighting
      ocpd_rating_a: 6
      ocpd_type: B
    - number: 2
      board_id: main
      designation: Kitchen Sockets
      ocpd_rating_a: 32
      ocpd_type: B
    - number: 3
      board_id: main
      designation: Cooker
      ocpd_rating_a: 32
      ocpd_type: B
    - number: 4
      board_id: main
      designation: Shower
      ocpd_rating_a: 40
      ocpd_type: B
    - number: 5
      board_id: main
      designation: Outside Lights
      ocpd_rating_a: 6
      ocpd_type: B
transcript:
  - at_ms: 0
    text: For circuit 3, trip time 25 ms, BS EN 61008, type AC, residual current 30 mA.
    isFinal: true
  - at_ms: 7000
    text: No.
    isFinal: true
expect:
  extraction_count:
    min: 1
  has_reading:
    - circuit: 3
      field: rcd_trip_time
      value: "25"
    - circuit: 3
      field: rcd_bs_en
      value: BS EN 61008
    - circuit: 3
      field: rcd_type
      value: AC
    - circuit: 3
      field: rcd_operating_current_ma
      value: "30"
  has_no_reading:
    - circuit: 1
      field: rcd_trip_time
      value: "25"
    - circuit: 1
      field: rcd_bs_en
      value: BS EN 61008
    - circuit: 1
      field: rcd_type
      value: AC
    - circuit: 1
      field: rcd_operating_current_ma
      value: "30"
    - circuit: 2
      field: rcd_trip_time
      value: "25"
    - circuit: 2
      field: rcd_bs_en
      value: BS EN 61008
    - circuit: 2
      field: rcd_type
      value: AC
    - circuit: 2
      field: rcd_operating_current_ma
      value: "30"
    - circuit: 4
      field: rcd_trip_time
      value: "25"
    - circuit: 4
      field: rcd_bs_en
      value: BS EN 61008
    - circuit: 4
      field: rcd_type
      value: AC
    - circuit: 4
      field: rcd_operating_current_ma
      value: "30"
    - circuit: 5
      field: rcd_trip_time
      value: "25"
    - circuit: 5
      field: rcd_bs_en
      value: BS EN 61008
    - circuit: 5
      field: rcd_type
      value: AC
    - circuit: 5
      field: rcd_operating_current_ma
      value: "30"
  ask_user_count:
    min: 1
    max: 1
  ask_user:
    - field: null
      text_matches: Apply these RCD details
config:
  timeout_ms: 70000
  drain_ms: 25000
  fetch_tts: false
