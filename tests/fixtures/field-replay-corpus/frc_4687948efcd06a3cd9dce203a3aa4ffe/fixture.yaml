# T10 — "a same-turn clear→write wipes the value on the client".
#
# Marker T10 field session (2026-07-16), feedback ids 80(B) + 81. The raw
# session id <-> this opaque corpus id mapping is deliberately NOT recorded here
# (private-mapping convention, mirroring the marker-① keystone). The inspector
# dictated "Downstairs Socket, circuit 3, IR L to L 100"; the value was read
# back aloud AND written server-side, then SILENTLY un-written on the client.
# The turn carried BOTH a clear_reading and a record_reading for the SAME slot
# (ir_live_live_mohm on circuit 3); the bundler emitted the extraction envelope
# (the write) FIRST, then the field_corrected frame (the stale clear, minted
# against pre-write state) AFTER it — so the clear landed last and wiped the
# write. Server ended with '100'; the client overview was empty. This is the
# INVERSE Audio-First violation (spoken-but-not-written).
#
# RECORDED-lane semantics: the model response is frozen (clear_reading then
# record_reading in one round — the model's clear→write correction dance,
# unchanged by the fix). The fix under lock is BACKEND-deterministic: the
# bundler's projection-time clear→write COLLAPSE (P5) that drops the stale
# clear_reading field_correction when a same-slot write survives, so the wire
# carries the write and NO wiping clear.
#
# Why a clear_then_write op (not a plain reading op): on PRE-FIX code the wiped
# write IS still present in extracted_readings (the wipe is the post-envelope
# field_corrected frame), so a plain reading oracle GREENs on broken main. The
# clear_then_write oracle JOINTLY asserts the replacement present AND zero
# same-slot clear_reading field_corrections — so it RED-proves the wipe.
# board_id/clear_board_id are both null: single-board job, the model passed no
# board_id on either call (the outward wire identities the collapse preserves).
#
# RED proof: reverting the P5 bundler collapse (git checkout <base> --
# src/extraction/stage6-event-bundler.js) and running `npm run
# replay:field-corpus` fails EXACTLY `reading.op_ir_ctw` ("clear_then_write:
# stale clear_reading correction survived …"); restoring the collapse takes the
# corpus back to green.
#
# audibility note (deliberate): chime_observed is FALSE, so the generic
# audibility.turn oracle does not run. The dictated read-back IS real (the write
# speaks once on BOTH pre- and post-fix — the bug is the WIPE, not the audio),
# so it is not the RED differentiator; this fixture isolates the WIRE-collapse
# contract, mirroring the F/U-4 write-only fixture's qualification.
#
# Provenance: HAND-AUTHORED regression fixture derived from marker T10 (the
# field session has NO field_sources/manifest — the iOS multipart analytics
# upload is broken — so it was reconstructed from the realtime chunks + backend
# CloudWatch, not from analyze-session.js). The clear→record model rounds and
# the ir_live_live_mohm 'LIM'→'100' transition are frozen from that
# reconstruction; exact millisecond tool ordering was correlated via transcript
# text + CloudWatch, not client timestamps. The recorded_full provenance labels
# on confirmations_enabled / in_response_to are SCHEMA-MANDATED for non-keystone
# fixtures and model the product defaults this synthetic turn assumes
# (confirmations on; not an answer turn). No captured PII.
