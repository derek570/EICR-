# Green guard — "a dictated reading is written AND read back aloud exactly once".
#
# Field capture, build 419 (2026-07-16), a HEALTHY turn: the inspector said
# "R1 plus R2 for upstairs sockets is 0.32", the live model recorded it, and
# the backend spoke the read-back confirmation (Audio-First #1 working). This
# is a required_green REGRESSION GUARD (the complement of the RED keystone ①):
# it replays the healthy turn through the real runShadowHarness and asserts the
# universal read-back stays working — exactly the integration behaviour that
# silently broke on web at the 2026-07-03 Flux flip (utterance-end lost → every
# confirmation deferred forever) and that unit tests, which don't drive the
# real pipeline end-to-end, did not catch. If the read-back ever regresses,
# this fixture goes RED and blocks the merge.
#
# Recorded-lane: the model response is frozen (record_reading), and the
# backend's read-back confirmation is the deterministic output under test. The
# raw session id ↔ opaque corpus id mapping lives in the private archive.
