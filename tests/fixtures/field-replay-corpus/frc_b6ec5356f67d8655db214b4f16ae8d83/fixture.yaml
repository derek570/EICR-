  value: false
  provenance: recorded_full
turns:
  - turn_index: 1
    at_ms: 0
    at_ms_provenance: recorded_full
    transcript: Zs for circuit 4.
    regex_results: []
    confirmations_enabled:
      value: true
      provenance: recorded_full
    in_response_to:
      value: false
      provenance: recorded_full
    ws_mode: open
    chime_observed: true
    chime_provenance_ref: 'chime_invoke (gate-pass; turn_core_summary capture 2026-07-18)'
    # Faithful capture: rounds:2, one calculate_zs call round 0 (tool_error=0),
    # empty end_turn round 1. Tool input authored to the real schema —
    # `all` is REQUIRED (stage6-tool-schemas.js:854), circuit_ref:4 from the
    # utterance. The dispatcher EXECUTES against the seeded job_state above:
    # circuit 4 exists (not circuit_missing), has no measured_zs_ohm (not
    # already_set), and circuits[0].earth_loop_impedance_ze is absent → skip
    # reason 'no_ze', result {ok:true, computed:[], skipped:[…]},
    # is_error:false — the exact zero-audible non-error shape under test.
    model_rounds:
      - stop_reason: tool_use
        tool_calls:
          - id: toolu_calczs
            name: calculate_zs
            input:
              circuit_ref: 4
              all: false
            schema_expectation: accept
            dispatcher_expectation: accept
      - stop_reason: end_turn
        text: ''
