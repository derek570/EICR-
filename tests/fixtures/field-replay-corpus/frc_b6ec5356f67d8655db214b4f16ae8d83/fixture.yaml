expires_at: '2099-01-01T00:00:00.000Z'
initial_state_fidelity: hand_authored
is_keystone: false
notes: >-
  Marker ② of the field-replay corpus gate: the tool-ran-but-nothing-audible
  beep-then-silence class ("Zs for circuit 4." → calculate_zs succeeds with
  computed:[]). Locks the catch-all audibility net (the FINAL net after
  A3/D2/F7) for Audio-First invariant #1 / the F7 chime-is-a-promise headline.
job_state:
  certificateType: eicr
  boards:
    - id: main
      board_type: main
  circuits:
