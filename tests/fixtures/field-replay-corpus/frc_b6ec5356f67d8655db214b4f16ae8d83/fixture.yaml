# marker-② — "chime-then-silence via a tool that ran, didn't error, and
# emitted nothing audible".
#
# Live prod capture (2026-07-18, real Haiku, marker-① already deployed on
# eicr-backend:326). The inspector dictated a field+circuit with NO value in
# the utterance — "Zs for circuit 4." — and the model called calculate_zs
# (CloudWatch voice_latency.turn_core_summary: tool_names_per_round =
# [["calculate_zs"],[]], tool_error=0, readings_count=0,
# bundler_emitted_count=0). The tool SUCCEEDED structurally but produced
# nothing (no inputs to calculate from: {ok:true, computed:[], skipped:[…]}),
# so the turn ended with zero audible output after a chime had fired.
# Reproducible 8/8. No existing net catches it: A3/marker-① need
# producedNothing (zero tool calls or all-rejected — a successful tool call
# defeats both), the M1 net needs every call is_error:true, and the F7
# pre-emission net needs an ATTEMPTED ask_user. This is the distinct class
# marker-② (the catch-all audibility net) closes.
#
# RECORDED-lane semantics: the model response is frozen to the faithful
# capture (one calculate_zs call, then an empty end_turn). The fix under lock
# is BACKEND-deterministic given that frozen response — the marker-② net in
# stage6-shadow-harness.js that speaks ONE apology when a chimed turn ends
# with zero speech-intent. A prompt/model fix (the Phase-4 steer) is
# live-lane, not this fixture's job.
#
# Seeded-state note (deliberate, so the fixture does not lie): the job_state
# seeder (_seedStateFromJobState) can only express supply Ze under the short
# `ze` key on circuits[0], never `earth_loop_impedance_ze` — the key
# dispatchCalculateZs actually reads. So the replayed dispatcher skip reason
# here is 'no_ze' (the first missing-input check to fire). The net ignores the
# reason — any computed:[] outcome is the silent class — and the
# 'no_r1_r2'-reason variant (Ze present, R1+R2 absent) is pinned by the
# marker-② unit suite (stage6-catchall-audibility-net.test.js case a), which
# builds the snapshot directly and CAN set earth_loop_impedance_ze.
#
# Provenance: transcript + model behaviour + chime are recorded_full from the
# CloudWatch capture. The raw session id ↔ this opaque corpus id mapping
# lives in the private field-replay archive, never in the committed corpus.
# Fidelity gap (accepted): client/address fields from the real session are
# omitted — they do not affect the audibility assertion.
