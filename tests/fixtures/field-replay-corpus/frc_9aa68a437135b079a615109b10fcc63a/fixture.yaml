# F/U-1 — "an explicit calculate_zs result is SPOKEN, not silently written".
#
# Regression lock for the deterministic calc read-back shipped 2026-07-19
# (follow-up F/U-1 from the marker-② wave). Pre-fix, calculator writes
# carried the `::calc::<tool>` source marker and were EXCLUDED from spoken
# read-back by the 2026-06-18 Audio-First auto-derivation exemption — an
# explicit "calculate Zs for circuit 4" computed and WROTE the value but the
# hands-free inspector heard beep-then-silence (marker-② deliberately
# exempted the fully-computed clean turn, so no apology fired either).
# Post-fix the bundler speaks every computed calculator result with distinct
# "calculated as" phrasing; mirror/polarity derivations (`derived: true`)
# remain the designed-silent exception.
#
# This fixture is the AUDIBLE twin of frc_a5f8cfebcb5cd7749412d09d984ebf09
# (the F/U-4 write-contract lock, whose fixture.yaml pins this exact
# follow-up: "When F/U-1 ships a deterministic calc read-back, flip this
# note by authoring a NEW fixture asserting it"). Same hand-authored
# job_state and frozen model response (one explicit-intent calculate_zs
# call, then an empty end_turn); what THIS fixture locks is the audible
# contract: chime_observed is TRUE and the declared expected_audible_outputs
# oracle requires exactly ONE reading_confirmation for the computed write.
#
# RECORDED-lane semantics: the frozen model response is unchanged by the fix
# (the model's side of the explicit-compute contract is identical pre/post);
# the fix under lock is BACKEND-deterministic (bundler confirmation
# synthesis). Pre-fix replay fails EXACTLY `audibility.output.out_zs_spoken`
# (the computed write lands but no confirmation is synthesised).
#
# Provenance: HAND-AUTHORED regression fixture (unit-test twins in
# stage6-event-bundler.test.js + stage6-catchall-audibility-net.test.js).
# The `recorded_full` provenance labels on confirmations_enabled /
# in_response_to are SCHEMA-MANDATED for non-keystone fixtures; they model
# the product defaults this synthetic turn assumes (confirmations on; not an
# answer turn). chime_observed:true models the production gate-pass ⟺ chime
# contract for a forwarded explicit-compute utterance. No captured PII.
schema_version: 1
corpus_id: frc_9aa68a437135b079a615109b10fcc63a
purpose: regression
gate_state: required_green
red_proof_failure_id: audibility.output.out_zs_spoken
owner: Derek Beckley
introduced_at: '2026-07-19T10:00:00Z'
fix_reference: fix_383b6a983ab3fcfcae572ca60a0b119d
expires_at: '2099-01-01T00:00:00.000Z'
initial_state_fidelity: hand_authored
is_keystone: false
notes: >-
  F/U-1 spoken calc read-back: an explicit "calculate Zs for circuit 4" on a
  job seeded with supply Ze 0.35 and circuit-4 R1+R2 0.86 must WRITE
  measured_zs_ohm 1.21 AND speak exactly one "calculated as" read-back
  (audibility exactly_once — the ::calc:: read-back exemption is retired for
  calculator results; mirrors stay derived_exempt).
job_state:
  certificateType: eicr
  boards:
    - id: main
      board_type: main
  supply:
    ze: '0.35'
  circuits:
    - number: 1
      designation: Cooker
    - number: 4
      designation: Upstairs Sockets
      r1R2Ohm: '0.86'
client_capabilities:
  value:
    - regex_fast_v2
    - client_playback_telemetry
    - low_conf_readback_v1
  provenance: recorded_full
fallback_to_legacy:
  value: false
  provenance: recorded_full
turns:
  - turn_index: 1
    at_ms: 0
    at_ms_provenance: recorded_full
    transcript: Calculate Zs for circuit 4.
    regex_results: []
    confirmations_enabled:
      value: true
      provenance: recorded_full
    in_response_to:
      value: false
      provenance: recorded_full
    ws_mode: open
    chime_observed: true
    model_rounds:
      - stop_reason: tool_use
        tool_calls:
          - id: toolu_fu1calc
            name: calculate_zs
            input:
              circuit_ref: 4
              all: false
            schema_expectation: accept
            dispatcher_expectation: accept
      - stop_reason: end_turn
        text: ''
    expected_operations:
      - operation_id: op_zs_calc
        kind: reading
        field: measured_zs_ohm
        circuit: 4
        value: '1.21'
        audibility: exactly_once
    expected_audible_outputs:
      - output_id: out_zs_spoken
        kind: reading_confirmation
        operation_ref: op_zs_calc
        count: 1
        match:
          field: measured_zs_ohm
          circuit: 4
