# F/U-4 — "a job-seeded supply Ze is invisible to calculate_zs".
#
# Regression lock for the supply-key contract drift found during the
# marker-② live investigation (2026-07-18): `_seedStateFromJobState` stored
# supply Ze under the legacy wire alias `circuits[0].ze`, while
# `dispatchCalculateZs` reads `circuits[0].earth_loop_impedance_ze` (the
# canonical field_schema key a DICTATED Ze lands under). Consequence: on any
# job-seeded session, EVERY explicit "calculate Zs" skipped with
# reason:'no_ze' even though the job carried a supply Ze — and the
# model-facing snapshot SHOWED the Ze (under `ze`), so the model reasonably
# kept calling the tool the dispatcher would refuse (split brain).
#
# RECORDED-lane semantics: the model response is frozen (one explicit-intent
# calculate_zs call, then an empty end_turn — the model's side of the
# explicit-compute contract, unchanged by the fix). The fix under lock is
# BACKEND-deterministic: the seeder/merge canonicalisation
# (SUPPLY_MERGE_KEY_ALIASES) that makes the seeded Ze visible so the REAL
# dispatcher computes measured_zs_ohm = Ze + R1+R2 = 0.35 + 0.86 = 1.21
# against this fixture's job_state. Pre-fix replay fails EXACTLY
# `reading.op_zs_calc` (the computed write never lands).
#
# audibility note (deliberate): chime_observed is FALSE, so the generic
# audibility.turn oracle does not run. A fully-computed calculate_zs turn is
# currently SILENT BY DESIGN (`::calc::` writes are read-back-exempt per the
# 2026-06-18 Audio-First auto-derivation exception, and marker-② deliberately
# exempts the fully-computed clean turn) — the spoken contract for
# explicitly-requested calculations is the OPEN follow-up F/U-1. When F/U-1
# ships a deterministic calc read-back, flip this note by authoring a NEW
# fixture asserting it (this fixture's payload is immutable); this one locks
# the WRITE contract only, via the derived_exempt audibility class.
#
# Provenance (Codex review r1 correction): this is a HAND-AUTHORED regression
# fixture built from the F/U-4 reproduction (unit-test twin:
# eicr-extraction-session.fu4-supply-ze-canonical.test.js), NOT a converted
# capture. The RED proof ran against the true pre-fix base — main @ 38781f55
# — via a file overlay (`git checkout 38781f55 -- src/extraction/
# eicr-extraction-session.js` + `npm run replay:field-corpus`), which failed
# EXACTLY `reading.op_zs_calc` ("expected RED confirmed"); the fix commit was
# then restored and the corpus went 4/4. The `recorded_full` provenance
# labels on confirmations_enabled / in_response_to are SCHEMA-MANDATED for
# non-keystone fixtures (reconstructed_reviewed is keystone-only); they model
# the product defaults this synthetic turn assumes (confirmations on; not an
# answer turn). chime_observed:false is likewise a deliberate synthetic
# write-only qualification (see the audibility note above), not a claim about
# production chime behaviour. No captured PII.
