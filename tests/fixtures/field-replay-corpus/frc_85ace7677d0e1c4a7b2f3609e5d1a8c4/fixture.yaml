# P4 (ask-decline-ack-net 2026-07-23, feedback id 85 / session 2ACE7677) —
# "an ANSWERED clarify ask with a silent continuation must speak ONE ack".
#
# Field repro (session 2ACE7677 turn-7): the assistant asked a clarify question
# about a reading, the inspector answered "No. Don't worry.", and the session
# went COMPLETELY SILENT — no ack, no apology, nothing. An answered turn that
# produces zero audible output violates "chime is a promise" / Audio-First #1.
#
# marker-② deliberately treats the earlier spoken ask as audibility evidence
# (its `emittedAskToolCallIds.size===0` term is CORRECT for the spoken-but-
# UNANSWERED class), so an ANSWERED-then-silent turn slips every existing net.
# The P4 net keys off the resolution-time `onAskAnswered` observer + a per-turn
# ask-lifecycle ledger and speaks ONE field-null decline ack.
#
# RECORDED-lane semantics: the frozen model response is unchanged by the fix
# (the model's side is the same no-op continuation pre/post — see the plan's
# A1 note; live A1 may instead ANSWER the decline via answer_user, making the
# net a backstop). The fix under lock is BACKEND-deterministic: the decline
# reply "No. Don't worry." escalates through the value resolver (no write, no
# pending-value apology), the model no-op's round 2, and the new net drains ONE
# decline-family ack into result.confirmations.
#
# ORACLE (plan Option B): the §A4-drained ack is `{text, field:null,
# circuit:null, expects_ios_ack:false}` — TOKENLESS (field:null is outside
# DEDUPE_TOKEN_FIELDS), and runtime `confirmationMatches` keys on `text_exact`.
# The ack rotates deterministically as `turnNum % ASK_DECLINE_ACK_PROMPTS.length`
# (turn 1 → index 1 → "No problem, moving on."), so the phrase is computable in
# the frozen lane. This needed the scoped `fixture-schema.mjs` relaxation
# (a non-empty trimmed `text_exact` alone validates a `field_null_fallback`
# matcher; a token would then FAIL the runtime match against the tokenless ack).
# The declared `expected_audible_outputs` carry BOTH the original ask_user frame
# AND the ack, so `matchAudibleOutputs` suppresses the `audibility.turn`
# false-pass (the ask question is itself "audible") and the RED id is
# `audibility.output.out_decline_ack`. Pre-fix replay fails EXACTLY that id
# (the ask emits + is claimed; the ack is never synthesised → 0 matches).
#
# Provenance: HAND-AUTHORED / reconstructed from realtime chunks — session
# 2ACE7677 has no field_sources/manifest (the iOS multipart analytics upload was
# broken; same constraint as the P3/P5 fixtures). Unit-test twins live in
# stage6-ask-decline-ack-net.test.js + the stage6-audibility-invariants P4
# integration case. No captured PII.
