# Keystone ① — "chime-then-silence via model no-op on a Flux garble".
#
# Captured session 36731498-3FA2-4AA6-A80A-7F610F4DE808, turn 4 (2026-07-16
# 06:13:21 UTC, build 419). The inspector said "Circuit 2 is upstairs lights";
# Deepgram Flux garbled it to "Chuck it too is upstairs lights." (conf 0.705).
# The live model treated the garble as a NO-OP (single end_turn round, zero
# tools) → the backend classified it zero-engagement chitchat → a chime fired
# with ZERO audible follow-up. This is the F7 invariant-(a) class (Audio-First
# #1: every chime must be followed by speakable output), reached via
# model-no-op rather than suppression.
#
# RECORDED-lane semantics: the model response is frozen to the faithful capture
# (end_turn no-op). This fixture therefore locks the BACKEND fix — the
# pre-emission fallback net that must emit ONE audible apology when a chime
# fired and nothing audible survived. When that net ships, this turn goes
# audible and the fixture XPASSes → flip gate_state to required_green in the
# fixing PR. A pure model/prompt fix is caught by the LIVE lane instead.
#
# Provenance: transcript + model behaviour + chime are recorded_full from the
# CloudWatch capture (see ~/.field-replay-archive/sources/, NOT committed).
# Fidelity gap (accepted): client name/address fields present in the real
# session are omitted from job_state — they do not affect the audibility
# assertion; only the two circuits + board are seeded.
