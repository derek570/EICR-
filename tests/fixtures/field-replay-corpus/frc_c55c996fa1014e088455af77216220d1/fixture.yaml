# Keystone ① — "chime-then-silence via model no-op on a Flux garble".
#
# Field capture, build 419 (2026-07-16). The inspector said "Circuit 2 is
# upstairs lights"; Deepgram Flux garbled it to "Chuck it too is upstairs
# lights." (conf 0.705). The live model treated the garble as a NO-OP (single
# end_turn round, zero tools) → the backend classified it zero-engagement
# chitchat → a chime fired with ZERO audible follow-up. This is the F7
# invariant-(a) class (Audio-First #1: every chime must be followed by
# speakable output), reached via model-no-op rather than suppression.
#
# RECORDED-lane semantics: the model response is frozen to the faithful capture
# (end_turn no-op). This fixture locks the BACKEND fix — the harness no-op
# audibility net (stage6-shadow-harness.js) that emits ONE audible apology when
# a chime fired and the model produced zero tools / nothing audible. That net
# SHIPPED (marker-① wave, 2026-07-17): the A3 orphan net's content gate was
# loosened from (carriesValue || carriesObservation) to also fire on a chimed
# no-content turn (options.chimeObserved), so this turn now goes audible and the
# gate_state is flipped expected_red → required_green (red_proof_failure_id
# retained as the dual-proof of what RED it guards). A pure model/prompt fix
# would instead be caught by the LIVE lane.
#
# Provenance: transcript + model behaviour + chime are recorded_full from the
# CloudWatch capture. The raw session id ↔ this opaque corpus id mapping and
# the raw bytes live in the private field-replay archive (governance layer,
# deferred), NEVER in the committed corpus. Fidelity gap (accepted): client
# name/address fields present in the real session are omitted from job_state —
# they do not affect the audibility assertion; only the two circuits + board
# are seeded.
