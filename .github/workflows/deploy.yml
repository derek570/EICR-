# CI/CD Pipeline for EICR-oMatic 3000
# Builds, tests, and deploys to AWS ECS

name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY_FRONTEND: eicr-frontend
  ECR_REPOSITORY_BACKEND: eicr-backend
  ECS_CLUSTER: eicr-cluster-production
  ECS_SERVICE_FRONTEND: eicr-frontend
  ECS_SERVICE_BACKEND: eicr-backend

jobs:
  # ============================================
  # Job 1: Test Node.js Backend
  # ============================================
  test-backend:
    name: Test Backend (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EICR_App/package-lock.json

      - name: Install dependencies
        working-directory: EICR_App
        run: npm ci

      - name: Check syntax (ES modules)
        working-directory: EICR_App
        run: |
          # Validate all JS files can be parsed
          for file in src/*.js run_job.js run_all.js; do
            if [ -f "$file" ]; then
              node --check "$file" || exit 1
            fi
          done

      - name: Run Jest tests
        working-directory: EICR_App
        run: npm test -- --coverage --ci
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: EICR_App/coverage/

  # ============================================
  # Job 2: Test & Build Next.js Frontend
  # ============================================
  test-frontend:
    name: Test Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EICR_App/package-lock.json

      - name: Install dependencies
        working-directory: EICR_App
        run: npm ci

      - name: Lint frontend
        working-directory: EICR_App/frontend
        run: npx eslint . --max-warnings=0 || true

      - name: Type check frontend
        working-directory: EICR_App/frontend
        run: npx tsc --noEmit || true

      - name: Build frontend
        working-directory: EICR_App/frontend
        run: npx next build
        env:
          CI: true

      - name: Run frontend tests
        working-directory: EICR_App/frontend
        run: npx jest --ci --passWithNoTests
        env:
          CI: true

  # ============================================
  # Job 2b: Security Audit
  # ============================================
  security-audit:
    name: npm Audit Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EICR_App/package-lock.json

      - name: Install dependencies
        working-directory: EICR_App
        run: npm ci

      - name: Run npm audit (high and critical)
        working-directory: EICR_App
        run: npm audit --audit-level=high || true

      - name: Run frontend npm audit
        working-directory: EICR_App/frontend
        run: npm audit --audit-level=high || true

  # ============================================
  # Job 3: Build Docker Images
  # ============================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-audit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: EICR_App
          file: EICR_App/docker/nextjs.Dockerfile
          push: false
          tags: eicr-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: EICR_App
          file: EICR_App/docker/backend.Dockerfile
          push: false
          tags: eicr-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Job 4: Deploy to AWS (main branch only)
  # ============================================
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend to ECR
        uses: docker/build-push-action@v5
        with:
          context: EICR_App
          file: EICR_App/docker/nextjs.Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Backend to ECR
        uses: docker/build-push-action@v5
        with:
          context: EICR_App
          file: EICR_App/docker/backend.Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update ECS Frontend Service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_FRONTEND }} \
            --force-new-deployment

      - name: Update ECS Backend Service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_BACKEND }} \
            --force-new-deployment

      - name: Wait for Frontend deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE_FRONTEND }}

      - name: Wait for Backend deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE_BACKEND }}

      - name: Deployment complete
        run: |
          echo "Deployment successful!"
          echo "Frontend: https://certomatic3000.co.uk"
          echo "Commit: ${{ github.sha }}"
