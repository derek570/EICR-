# CI/CD Pipeline for EICR-oMatic 3000
# Builds, tests, and deploys to AWS ECS

name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY_FRONTEND: eicr-frontend
  ECR_REPOSITORY_BACKEND: eicr-backend
  ECS_CLUSTER: eicr-cluster-production
  ECS_SERVICE_FRONTEND: eicr-frontend
  ECS_SERVICE_BACKEND: eicr-backend

jobs:
  # ============================================
  # Job 1: Test Node.js Backend
  # ============================================
  test-backend:
    name: Test Backend (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check syntax (ES modules)
        run: |
          # Validate all JS files can be parsed
          for file in src/*.js run_job.js run_all.js; do
            if [ -f "$file" ]; then
              node --check "$file" || exit 1
            fi
          done

      - name: Run Jest tests
        run: npm test -- --coverage --ci
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/

  # ============================================
  # Job 2: Test & Build Next.js Frontend
  # ============================================
  test-frontend:
    name: Test Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npx eslint . --max-warnings=0 || true

      - name: Type check frontend
        working-directory: frontend
        run: npx tsc --noEmit || true

      - name: Build frontend
        working-directory: frontend
        run: npx next build
        env:
          CI: true

      - name: Run frontend tests
        working-directory: frontend
        run: npx jest --ci --passWithNoTests
        env:
          CI: true

  # ============================================
  # Job 2b: Security Audit
  # ============================================
  security-audit:
    name: npm Audit Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high and critical)
        run: npm audit --audit-level=high || true

      - name: Run frontend npm audit
        working-directory: frontend
        run: npm audit --audit-level=high || true

  # ============================================
  # Job 3: Build Docker Images
  # ============================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-audit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nextjs.Dockerfile
          push: false
          load: true
          tags: eicr-frontend:${{ github.sha }}
          build-args: |
            APP_DIR=frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          push: false
          load: true
          tags: eicr-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Job 3b: Scan Container Images with Trivy
  # ============================================
  scan-images:
    name: Scan Container Images
    runs-on: ubuntu-latest
    needs: [build-images]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image for Scan
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nextjs.Dockerfile
          push: false
          load: true
          tags: eicr-frontend:${{ github.sha }}
          build-args: |
            APP_DIR=frontend
          cache-from: type=gha

      - name: Build Backend Image for Scan
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          push: false
          load: true
          tags: eicr-backend:${{ github.sha }}
          cache-from: type=gha

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'eicr-frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'eicr-backend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

  # ============================================
  # Job 4: Deploy to Staging (develop branch)
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [scan-images]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend to ECR (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nextjs.Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:staging-${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:staging-latest
          build-args: |
            APP_DIR=frontend
            NODE_ENV=staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Backend to ECR (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:staging-${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:staging-latest
          build-args: |
            NODE_ENV=staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update ECS Staging Frontend Service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service certmate-staging-frontend \
            --force-new-deployment

      - name: Update ECS Staging Backend Service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service certmate-staging-backend \
            --force-new-deployment

      - name: Wait for Staging Frontend deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services certmate-staging-frontend

      - name: Wait for Staging Backend deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services certmate-staging-backend

      - name: Staging deployment complete
        run: |
          echo "Staging deployment successful!"
          echo "Staging Frontend: https://staging.certomatic3000.co.uk"
          echo "Commit: ${{ github.sha }}"

  # ============================================
  # Job 5: Deploy to Production (main branch, manual approval)
  # ============================================
  deploy:
    name: Deploy to AWS ECS (Production)
    runs-on: ubuntu-latest
    needs: [scan-images]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nextjs.Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:latest
          build-args: |
            APP_DIR=frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Backend to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update ECS Frontend Service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_FRONTEND }} \
            --force-new-deployment

      - name: Update ECS Backend Service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_BACKEND }} \
            --force-new-deployment

      - name: Wait for Frontend deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE_FRONTEND }}

      - name: Wait for Backend deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE_BACKEND }}

      - name: Deployment complete
        run: |
          echo "Production deployment successful!"
          echo "Frontend: https://certomatic3000.co.uk"
          echo "Commit: ${{ github.sha }}"
