# CI/CD Pipeline for EICR-oMatic 3000 (CertMate)
# Builds, tests, and deploys to AWS ECS
#
# Triggers:
#   - Push to main    → test + build + deploy to production
#   - Push to develop → test + build + deploy to staging (if staging services exist)
#   - workflow_dispatch → manual deploy (backend-only, frontend-only, or both)
#
# Manual deploy from CLI:
#   gh workflow run deploy.yml -f deploy_target=backend -f environment=production
#   gh workflow run deploy.yml -f deploy_target=frontend -f environment=production
#   gh workflow run deploy.yml -f deploy_target=both -f environment=production

name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'What to deploy'
        required: true
        type: choice
        options:
          - both
          - backend
          - frontend
        default: both
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - production
          - staging
        default: production

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY_FRONTEND: eicr-frontend
  ECR_REPOSITORY_BACKEND: eicr-backend
  ECS_CLUSTER: eicr-cluster-production
  ECS_SERVICE_FRONTEND: eicr-pwa
  ECS_SERVICE_BACKEND: eicr-backend

jobs:
  # ============================================
  # Job 1: Test Node.js Backend
  # ============================================
  test-backend:
    name: Test Backend (Node.js)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check syntax (ES modules)
        run: |
          # Validate all JS files can be parsed
          for file in src/*.js run_job.js run_all.js; do
            if [ -f "$file" ]; then
              node --check "$file" || exit 1
            fi
          done

      - name: Run Jest tests
        run: npm test -- --coverage --ci
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/

  # ============================================
  # Job 2: Test & Build Next.js Frontend
  # ============================================
  test-frontend:
    name: Test Frontend (Next.js)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npx eslint . --max-warnings=0 || true

      - name: Type check frontend
        working-directory: frontend
        run: npx tsc --noEmit || true

      - name: Build frontend
        working-directory: frontend
        run: npx next build
        env:
          CI: true

      - name: Run frontend tests
        working-directory: frontend
        run: npx jest --ci --passWithNoTests
        env:
          CI: true

  # ============================================
  # Job 2b: Security Audit
  # ============================================
  security-audit:
    name: npm Audit Security Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high and critical)
        run: npm audit --audit-level=high || true

      - name: Run frontend npm audit
        working-directory: frontend
        run: npm audit --audit-level=high || true

  # ============================================
  # Job 3: Build, Scan & Cache Docker Images
  # ============================================
  build-images:
    name: Build & Scan Docker Images
    runs-on: ubuntu-24.04-arm
    needs: [test-backend, test-frontend, security-audit]
    if: always() && (github.event_name == 'workflow_dispatch' || (needs.test-backend.result == 'success' && needs.test-frontend.result == 'success'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        if: github.event_name != 'workflow_dispatch' || inputs.deploy_target != 'backend'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nextjs.Dockerfile
          platforms: linux/arm64
          push: false
          load: true
          tags: eicr-frontend:${{ github.sha }}
          build-args: |
            APP_DIR=frontend
            NEXT_PUBLIC_API_URL=https://certmate.uk
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Backend Image
        if: github.event_name != 'workflow_dispatch' || inputs.deploy_target != 'frontend'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          platforms: linux/arm64
          push: false
          load: true
          tags: eicr-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Frontend Image (blocking on CRITICAL)
        if: github.event_name != 'workflow_dispatch' || inputs.deploy_target != 'backend'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'eicr-frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Scan Frontend Image (HIGH - advisory only)
        if: always() && (github.event_name != 'workflow_dispatch' || inputs.deploy_target != 'backend')
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'eicr-frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          severity: 'HIGH'

      - name: Scan Backend Image (blocking on CRITICAL)
        if: github.event_name != 'workflow_dispatch' || inputs.deploy_target != 'frontend'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'eicr-backend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Scan Backend Image (HIGH - advisory only)
        if: always() && (github.event_name != 'workflow_dispatch' || inputs.deploy_target != 'frontend')
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'eicr-backend:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          severity: 'HIGH'

  # ============================================
  # Job 4: Deploy to Staging (develop branch)
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-24.04-arm
    needs: [build-images]
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine deploy scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ inputs.deploy_target }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=both" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Frontend to ECR (staging)
        if: steps.scope.outputs.target != 'backend'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nextjs.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:staging-${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:staging-latest
          build-args: |
            APP_DIR=frontend
            NEXT_PUBLIC_API_URL=https://staging.certmate.uk
            NODE_ENV=staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Backend to ECR (staging)
        if: steps.scope.outputs.target != 'frontend'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:staging-${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:staging-latest
          build-args: |
            NODE_ENV=staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check if staging ECS services exist
        id: staging-check
        run: |
          # Check if staging services exist before trying to deploy
          FRONTEND_EXISTS=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services eicr-staging-frontend --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
          BACKEND_EXISTS=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services eicr-staging-backend --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
          echo "frontend_exists=$FRONTEND_EXISTS" >> "$GITHUB_OUTPUT"
          echo "backend_exists=$BACKEND_EXISTS" >> "$GITHUB_OUTPUT"
          echo "Staging frontend service: $FRONTEND_EXISTS"
          echo "Staging backend service: $BACKEND_EXISTS"
          if [ "$FRONTEND_EXISTS" = "MISSING" ] && [ "$BACKEND_EXISTS" = "MISSING" ]; then
            echo "WARNING: No staging ECS services found. Images pushed to ECR but no ECS deploy."
            echo "To create staging services, run: aws ecs create-service ..."
          fi

      - name: Update ECS Staging Frontend Service
        if: steps.scope.outputs.target != 'backend' && steps.staging-check.outputs.frontend_exists == 'ACTIVE'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service eicr-staging-frontend \
            --force-new-deployment

      - name: Update ECS Staging Backend Service
        if: steps.scope.outputs.target != 'frontend' && steps.staging-check.outputs.backend_exists == 'ACTIVE'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service eicr-staging-backend \
            --force-new-deployment

      - name: Wait for Staging deployment
        if: steps.staging-check.outputs.frontend_exists == 'ACTIVE' || steps.staging-check.outputs.backend_exists == 'ACTIVE'
        run: |
          if [ "${{ steps.staging-check.outputs.frontend_exists }}" = "ACTIVE" ] && [ "${{ steps.scope.outputs.target }}" != "backend" ]; then
            aws ecs wait services-stable --cluster ${{ env.ECS_CLUSTER }} --services eicr-staging-frontend
          fi
          if [ "${{ steps.staging-check.outputs.backend_exists }}" = "ACTIVE" ] && [ "${{ steps.scope.outputs.target }}" != "frontend" ]; then
            aws ecs wait services-stable --cluster ${{ env.ECS_CLUSTER }} --services eicr-staging-backend
          fi

      - name: Staging deployment complete
        run: |
          echo "Staging deployment complete!"
          echo "Images pushed to ECR with staging tags."
          echo "Commit: ${{ github.sha }}"

  # ============================================
  # Job 5: Deploy to Production (main branch or manual)
  # ============================================
  deploy:
    name: Deploy to AWS ECS (Production)
    runs-on: ubuntu-24.04-arm
    needs: [build-images]
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine deploy scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ inputs.deploy_target }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=both" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Frontend to ECR
        if: steps.scope.outputs.target != 'backend'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nextjs.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:latest
          build-args: |
            APP_DIR=frontend
            NEXT_PUBLIC_API_URL=https://certmate.uk
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Backend to ECR
        if: steps.scope.outputs.target != 'frontend'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Register ARM64 Frontend Task Definition
        if: steps.scope.outputs.target != 'backend'
        id: register-frontend-taskdef
        run: |
          TASK_ARN=$(aws ecs register-task-definition \
            --region ${{ env.AWS_REGION }} \
            --cli-input-json file://ecs/task-def-frontend.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"

      - name: Register ARM64 Backend Task Definition
        if: steps.scope.outputs.target != 'frontend'
        id: register-backend-taskdef
        run: |
          TASK_ARN=$(aws ecs register-task-definition \
            --region ${{ env.AWS_REGION }} \
            --cli-input-json file://ecs/task-def-backend.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS Frontend Service
        if: steps.scope.outputs.target != 'backend'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_FRONTEND }} \
            --task-definition ${{ steps.register-frontend-taskdef.outputs.task_arn }} \
            --force-new-deployment

      - name: Update ECS Backend Service
        if: steps.scope.outputs.target != 'frontend'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_BACKEND }} \
            --task-definition ${{ steps.register-backend-taskdef.outputs.task_arn }} \
            --force-new-deployment

      - name: Wait for deployment
        run: |
          if [ "${{ steps.scope.outputs.target }}" != "backend" ]; then
            echo "Waiting for frontend deployment..."
            aws ecs wait services-stable \
              --cluster ${{ env.ECS_CLUSTER }} \
              --services ${{ env.ECS_SERVICE_FRONTEND }}
          fi
          if [ "${{ steps.scope.outputs.target }}" != "frontend" ]; then
            echo "Waiting for backend deployment..."
            aws ecs wait services-stable \
              --cluster ${{ env.ECS_CLUSTER }} \
              --services ${{ env.ECS_SERVICE_BACKEND }}
          fi

      - name: Deployment complete
        run: |
          echo "Production deployment successful!"
          echo "Frontend: https://certmate.uk"
          echo "Commit: ${{ github.sha }}"
