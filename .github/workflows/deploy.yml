# CI/CD Pipeline for EICR-oMatic 3000 (CertMate)
# Builds, tests, and deploys to AWS ECS
#
# Triggers:
#   - Push to main    → test + build + deploy to production. Build/deploy
#                       scope is path-aware: backend-only changes skip the
#                       frontend Docker build (~17 min faster) and vice versa.
#                       Detection rules live on the `detect-changes` job.
#   - Push to develop → test + build + deploy to staging (if staging services exist)
#   - workflow_dispatch → manual deploy (backend-only, frontend-only, or both)
#
# Manual deploy from CLI (overrides path detection):
#   gh workflow run deploy.yml -f deploy_target=backend -f environment=production
#   gh workflow run deploy.yml -f deploy_target=frontend -f environment=production   (builds web/ dir)
#   gh workflow run deploy.yml -f deploy_target=both -f environment=production

name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'What to deploy'
        required: true
        type: choice
        options:
          - both
          - backend
          - frontend
        default: both
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - production
          - staging
        default: production

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY_FRONTEND: eicr-frontend
  ECR_REPOSITORY_BACKEND: eicr-backend
  ECS_CLUSTER: eicr-cluster-production
  ECS_SERVICE_FRONTEND: eicr-pwa
  ECS_SERVICE_BACKEND: eicr-backend

jobs:
  # ============================================
  # Job 0: Detect changed paths (path-aware build skip)
  # ============================================
  # Outputs `target = backend | frontend | both | none` so downstream jobs can
  # skip the half they don't need. Removes ~17 min from backend-only pushes
  # (no frontend Docker build) and ~5 min from frontend-only pushes (no backend
  # build). For workflow_dispatch the user-supplied `deploy_target` wins so
  # operators can still force a both-build via `gh workflow run`.
  #
  # Backend-only triggers: src/**, config/**, scripts/**, docker/backend.*,
  # ecs/task-def-backend.json. Frontend-only: web/**, docker/nextjs.*,
  # ecs/task-def-frontend.json. Shared: package.json/package-lock.json (counts
  # as both — npm workspaces) plus the workflow file itself.
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.compute.outputs.target }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'web/**'
              - 'docker/nextjs.Dockerfile'
              - 'ecs/task-def-frontend.json'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/deploy.yml'
            backend:
              - 'src/**'
              - 'config/**'
              - 'scripts/**'
              - 'docker/backend.Dockerfile'
              - 'ecs/task-def-backend.json'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/deploy.yml'
      - name: Compute effective target
        id: compute
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ inputs.deploy_target }}" >> "$GITHUB_OUTPUT"
            echo "Manual workflow_dispatch — target=${{ inputs.deploy_target }}"
          else
            FE='${{ steps.filter.outputs.frontend }}'
            BE='${{ steps.filter.outputs.backend }}'
            if [ "$FE" = "true" ] && [ "$BE" = "true" ]; then
              echo "target=both" >> "$GITHUB_OUTPUT"
              echo "Path filter — both changed (target=both)"
            elif [ "$FE" = "true" ]; then
              echo "target=frontend" >> "$GITHUB_OUTPUT"
              echo "Path filter — frontend-only (target=frontend, skipping backend build)"
            elif [ "$BE" = "true" ]; then
              echo "target=backend" >> "$GITHUB_OUTPUT"
              echo "Path filter — backend-only (target=backend, skipping frontend build)"
            else
              # Defensive default: nothing recognised changed (e.g. README only).
              # Keep the workflow flexible — fall back to both rather than
              # accidentally skipping a deploy the operator expected.
              echo "target=both" >> "$GITHUB_OUTPUT"
              echo "Path filter — no FE/BE paths matched (target=both, defensive)"
            fi
          fi

  # ============================================
  # Job 1: Test Node.js Backend
  # ============================================
  test-backend:
    name: Test Backend (Node.js)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check syntax (ES modules)
        run: |
          # Validate all JS files can be parsed
          for file in src/*.js run_job.js run_all.js; do
            if [ -f "$file" ]; then
              node --check "$file" || exit 1
            fi
          done

      - name: Run Jest tests
        run: npm test -- --coverage --ci
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/

  # ============================================
  # Job 2: Test & Build Next.js Frontend
  # ============================================
  test-frontend:
    name: Test Frontend (Next.js)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        working-directory: web
        run: npx eslint . --max-warnings=0 || true

      - name: Type check frontend
        working-directory: web
        run: npx tsc --noEmit || true

      - name: Build frontend
        working-directory: web
        run: npm run build
        env:
          CI: true

      - name: Run frontend tests
        working-directory: web
        run: npx vitest run
        env:
          CI: true

  # ============================================
  # Job 2b: Security Audit
  # ============================================
  security-audit:
    name: npm Audit Security Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high and critical)
        run: npm audit --audit-level=high || true

      - name: Run frontend npm audit
        working-directory: web
        run: npm audit --audit-level=high || true

  # ============================================
  # Job 3: Build, Scan & Cache Docker Images
  # ============================================
  build-images:
    name: Build & Scan Docker Images
    runs-on: ubuntu-24.04-arm
    needs: [detect-changes, test-backend, test-frontend, security-audit]
    if: always() && (github.event_name == 'workflow_dispatch' || (needs.test-backend.result == 'success' && needs.test-frontend.result == 'success'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        if: needs.detect-changes.outputs.target != 'backend'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nextjs.Dockerfile
          platforms: linux/arm64
          push: false
          load: true
          tags: eicr-frontend:${{ github.sha }}
          build-args: |
            APP_DIR=web
            NEXT_PUBLIC_API_URL=https://api.certmate.uk
            NEXT_PUBLIC_REGEX_HINTS_ENABLED=1
            NEXT_PUBLIC_RECORDING_RECONNECT_ENABLED=true
            NEXT_PUBLIC_SILERO_VAD=0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Backend Image
        if: needs.detect-changes.outputs.target != 'frontend'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          platforms: linux/arm64
          push: false
          load: true
          tags: eicr-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Frontend Image (blocking on CRITICAL)
        if: needs.detect-changes.outputs.target != 'backend'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'eicr-frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Scan Frontend Image (HIGH - advisory only)
        if: always() && needs.detect-changes.outputs.target != 'backend'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'eicr-frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          severity: 'HIGH'

      - name: Scan Backend Image (blocking on CRITICAL)
        if: needs.detect-changes.outputs.target != 'frontend'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'eicr-backend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Scan Backend Image (HIGH - advisory only)
        if: always() && needs.detect-changes.outputs.target != 'frontend'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'eicr-backend:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          severity: 'HIGH'

  # ============================================
  # Job 4: Deploy to Staging (develop branch)
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-24.04-arm
    needs: [detect-changes, build-images]
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine deploy scope
        id: scope
        run: |
          # Read from the shared detect-changes output (covers both push and
          # workflow_dispatch — see detect-changes job at top of file).
          echo "target=${{ needs.detect-changes.outputs.target }}" >> "$GITHUB_OUTPUT"
          echo "Deploy scope: ${{ needs.detect-changes.outputs.target }}"

      - name: Build and push Frontend to ECR (staging)
        if: steps.scope.outputs.target != 'backend'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nextjs.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:staging-${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:staging-latest
          build-args: |
            APP_DIR=web
            NEXT_PUBLIC_API_URL=https://staging.certmate.uk
            NEXT_PUBLIC_REGEX_HINTS_ENABLED=1
            NEXT_PUBLIC_RECORDING_RECONNECT_ENABLED=true
            NEXT_PUBLIC_SILERO_VAD=0
            NODE_ENV=staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Backend to ECR (staging)
        if: steps.scope.outputs.target != 'frontend'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:staging-${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:staging-latest
          build-args: |
            NODE_ENV=staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check if staging ECS services exist
        id: staging-check
        run: |
          # Check if staging services exist before trying to deploy
          FRONTEND_EXISTS=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services eicr-staging-frontend --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
          BACKEND_EXISTS=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services eicr-staging-backend --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
          echo "frontend_exists=$FRONTEND_EXISTS" >> "$GITHUB_OUTPUT"
          echo "backend_exists=$BACKEND_EXISTS" >> "$GITHUB_OUTPUT"
          echo "Staging frontend service: $FRONTEND_EXISTS"
          echo "Staging backend service: $BACKEND_EXISTS"
          if [ "$FRONTEND_EXISTS" = "MISSING" ] && [ "$BACKEND_EXISTS" = "MISSING" ]; then
            echo "WARNING: No staging ECS services found. Images pushed to ECR but no ECS deploy."
            echo "To create staging services, run: aws ecs create-service ..."
          fi

      - name: Update ECS Staging Frontend Service
        if: steps.scope.outputs.target != 'backend' && steps.staging-check.outputs.frontend_exists == 'ACTIVE'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service eicr-staging-frontend \
            --force-new-deployment

      - name: Update ECS Staging Backend Service
        if: steps.scope.outputs.target != 'frontend' && steps.staging-check.outputs.backend_exists == 'ACTIVE'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service eicr-staging-backend \
            --force-new-deployment

      - name: Wait for Staging deployment
        if: steps.staging-check.outputs.frontend_exists == 'ACTIVE' || steps.staging-check.outputs.backend_exists == 'ACTIVE'
        run: |
          if [ "${{ steps.staging-check.outputs.frontend_exists }}" = "ACTIVE" ] && [ "${{ steps.scope.outputs.target }}" != "backend" ]; then
            aws ecs wait services-stable --cluster ${{ env.ECS_CLUSTER }} --services eicr-staging-frontend
          fi
          if [ "${{ steps.staging-check.outputs.backend_exists }}" = "ACTIVE" ] && [ "${{ steps.scope.outputs.target }}" != "frontend" ]; then
            aws ecs wait services-stable --cluster ${{ env.ECS_CLUSTER }} --services eicr-staging-backend
          fi

      - name: Staging deployment complete
        run: |
          echo "Staging deployment complete!"
          echo "Images pushed to ECR with staging tags."
          echo "Commit: ${{ github.sha }}"

  # ============================================
  # Job 5: Deploy to Production (main branch or manual)
  # ============================================
  deploy:
    name: Deploy to AWS ECS (Production)
    runs-on: ubuntu-24.04-arm
    needs: [detect-changes, build-images]
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine deploy scope
        id: scope
        run: |
          # Read from the shared detect-changes output (covers both push and
          # workflow_dispatch — see detect-changes job at top of file).
          # Backend-only push skips the entire frontend build + deploy here,
          # cutting ~17 min off the wall-clock for backend-only iterations.
          echo "target=${{ needs.detect-changes.outputs.target }}" >> "$GITHUB_OUTPUT"
          echo "Deploy scope: ${{ needs.detect-changes.outputs.target }}"

      - name: Build and push Frontend to ECR
        if: steps.scope.outputs.target != 'backend'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nextjs.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:latest
          build-args: |
            APP_DIR=web
            NEXT_PUBLIC_API_URL=https://api.certmate.uk
            NEXT_PUBLIC_REGEX_HINTS_ENABLED=1
            NEXT_PUBLIC_RECORDING_RECONNECT_ENABLED=true
            NEXT_PUBLIC_SILERO_VAD=0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Backend to ECR
        if: steps.scope.outputs.target != 'frontend'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Drift guardrails (added 2026-05-22) — runs BEFORE register-task-
      # definition so an out-of-band env-var hotfix can't be silently
      # stripped from the live task def by re-registering from the
      # source template. See CLAUDE.md "MANDATORY — Infrastructure
      # changes must come from source" + scripts/check-task-def-env-drift.sh
      # header for the full failure-mode story.
      #
      # Bypass: include [skip-drift-check] in the commit message AND
      # follow up with a real source commit immediately after. Emergency
      # only — do not normalise.

      - name: Check Frontend Task-Def Drift
        if: steps.scope.outputs.target != 'backend'
        env:
          ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ALLOW_TASKDEF_DRIFT: ${{ contains(github.event.head_commit.message, '[skip-drift-check]') && '1' || '' }}
        run: |
          ./scripts/check-task-def-env-drift.sh ${{ env.ECS_SERVICE_FRONTEND }} ecs/task-def-frontend.json

      - name: Register ARM64 Frontend Task Definition
        if: steps.scope.outputs.target != 'backend'
        id: register-frontend-taskdef
        run: |
          TASK_ARN=$(aws ecs register-task-definition \
            --region ${{ env.AWS_REGION }} \
            --cli-input-json file://ecs/task-def-frontend.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"

      - name: Check Backend Task-Def Drift
        if: steps.scope.outputs.target != 'frontend'
        env:
          ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ALLOW_TASKDEF_DRIFT: ${{ contains(github.event.head_commit.message, '[skip-drift-check]') && '1' || '' }}
        run: |
          ./scripts/check-task-def-env-drift.sh ${{ env.ECS_SERVICE_BACKEND }} ecs/task-def-backend.json

      # Phase 0 of the 2026-05-27 snapshot-restructure sprint — second
      # layer of the task-def source-of-truth guard. Catches the OPPOSITE
      # drift direction to the check above: env vars referenced by code
      # but missing from the source template AND missing from the
      # allowlist baked into the script. Fires before
      # register-task-definition so a new flag that needs to ride into
      # production can't be silently defaulted.
      - name: Audit Env-Var Source (backend code vs task-def)
        if: steps.scope.outputs.target != 'frontend'
        run: |
          ./scripts/audit-env-var-source.sh ecs/task-def-backend.json

      - name: Register ARM64 Backend Task Definition
        if: steps.scope.outputs.target != 'frontend'
        id: register-backend-taskdef
        run: |
          TASK_ARN=$(aws ecs register-task-definition \
            --region ${{ env.AWS_REGION }} \
            --cli-input-json file://ecs/task-def-backend.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"

      # Apply any pending node-pg-migrate migrations BEFORE rolling the
      # backend service onto the new image. The migration task uses the
      # task-def we just registered, so it runs against the same image
      # (same migrations folder) the service is about to use. Service
      # update is blocked until the migration task exits 0.
      #
      # Why this step exists: prior to 2026-05-29 there was no migration
      # step in CI. Migration 010_account_consents and 011_cert_attestations
      # (committed alongside the route code in 02e13380) sat un-applied
      # in production, surfacing on the iOS app as the "failed to record
      # attestations" 500 when the inspector tried to issue a PDF. See
      # scripts/migrate-from-secrets.js for the full back-story.
      #
      # Failure semantics: if the migration task exits non-zero (or the
      # task itself fails to start), this step exits 1 and the deploy
      # stops here — old code keeps serving against the old schema, which
      # is the right side to fail to during a botched migration.
      - name: Run DB migrations (one-off Fargate task)
        if: steps.scope.outputs.target != 'frontend'
        run: |
          set -euo pipefail

          # Network config matches the running backend service — same
          # subnets and security group so the one-off task has the same
          # RDS reachability as a real backend container.
          NET=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE_BACKEND }} \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].networkConfiguration' \
            --output json)

          OVERRIDES=$(jq -nc \
            --arg cmd0 "node" --arg cmd1 "scripts/migrate-from-secrets.js" \
            '{containerOverrides:[{name:"eicr-backend", command:[$cmd0, $cmd1]}]}')

          echo "Starting migration task..."
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition ${{ steps.register-backend-taskdef.outputs.task_arn }} \
            --launch-type FARGATE \
            --network-configuration "$NET" \
            --overrides "$OVERRIDES" \
            --started-by "ci-migrate-${{ github.sha }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].taskArn' \
            --output text)

          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "::error::Failed to start migration task"
            exit 1
          fi
          echo "Migration task: $TASK_ARN"

          echo "Waiting for migration task to finish (max 10 min)..."
          aws ecs wait tasks-stopped \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks "$TASK_ARN" \
            --region ${{ env.AWS_REGION }}

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks "$TASK_ARN" \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].containers[?name==`eicr-backend`].exitCode | [0]' \
            --output text)
          STOP_REASON=$(aws ecs describe-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks "$TASK_ARN" \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].stoppedReason' \
            --output text)
          echo "Migration task exit code: $EXIT_CODE (stoppedReason: $STOP_REASON)"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migration failed (exit $EXIT_CODE). Check CloudWatch /ecs/eicr/eicr-backend for task $TASK_ARN."
            exit 1
          fi

      - name: Update ECS Frontend Service
        if: steps.scope.outputs.target != 'backend'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_FRONTEND }} \
            --task-definition ${{ steps.register-frontend-taskdef.outputs.task_arn }} \
            --force-new-deployment

      - name: Update ECS Backend Service
        if: steps.scope.outputs.target != 'frontend'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_BACKEND }} \
            --task-definition ${{ steps.register-backend-taskdef.outputs.task_arn }} \
            --force-new-deployment

      - name: Wait for deployment
        run: |
          if [ "${{ steps.scope.outputs.target }}" != "backend" ]; then
            echo "Waiting for frontend deployment..."
            aws ecs wait services-stable \
              --cluster ${{ env.ECS_CLUSTER }} \
              --services ${{ env.ECS_SERVICE_FRONTEND }}
          fi
          if [ "${{ steps.scope.outputs.target }}" != "frontend" ]; then
            echo "Waiting for backend deployment..."
            aws ecs wait services-stable \
              --cluster ${{ env.ECS_CLUSTER }} \
              --services ${{ env.ECS_SERVICE_BACKEND }}
          fi

      - name: Deployment complete
        run: |
          echo "Production deployment successful!"
          echo "Frontend: https://certmate.uk"
          echo "Commit: ${{ github.sha }}"
