name: Field Replay Evidence (trusted)

# The IMMUTABLE deterministic-evidence workflow (plan replay-corpus-gate-2026-07
# Item 4). A byte-identical evidence WORKFLOW is not enough — the run still
# executes branch-controlled code, so before invoking the runner it verifies
# every trusted-harness-manifest file against the ANCHORED target-branch blob
# (main), having first verified the checked-out manifest is byte-identical to
# the target-branch copy. It runs the recorded corpus in PROOF or RED mode,
# then uploads a STRUCTURED runner-result.json artifact that accept-evidence
# fetches by run id + artifact name and verifies (repository, this workflow's
# anchored blob SHA, event, ref, head/base SHA, conclusion, artifact digest,
# fixture hash, assertion id, tested tree). Keystone/fixing PRs are PROHIBITED
# from changing manifest paths (enforced in test-backend); harness changes
# anchor via a Foundation-style PR first.
#
# Pinned to the ONE replay-runtime definition (Node 20.20.2). Third-party
# actions are pinned to full commit SHAs (a mutable @v tag sits outside the
# anchored workflow blob).

on:
  workflow_dispatch:
    inputs:
      proof_state:
        description: 'required_green (GREEN proof at fix subject) or empty for RED capture'
        required: false
        default: ''
      subject_sha:
        description: 'the pinned subject code SHA under test (e.g. 8fb95b7b)'
        required: false
        default: ''
      fixture:
        description: 'optional single corpus id to scope evidence to'
        required: false
        default: ''
  pull_request:
    paths:
      - 'tests/fixtures/field-replay-corpus/**'

permissions:
  contents: read
  actions: read

jobs:
  evidence:
    name: Deterministic evidence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history — target-branch blob comparison)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js (pinned exact)
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: '20.20.2'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install (locked, no scripts, no restored caches beyond npm)
        run: npm ci --ignore-scripts

      - name: Verify trusted-harness manifest against the anchored target-branch blobs
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/field-replay/verify-harness-manifest.mjs --anchor-ref=main

      - name: Generate deterministic evidence
        id: evidence
        env:
          CI: true
          FIELD_REPLAY_ASSERT_SUBJECT_SHA: ${{ github.event.inputs.subject_sha }}
        run: |
          set -euo pipefail
          PROOF="${{ github.event.inputs.proof_state }}"
          FIXTURE="${{ github.event.inputs.fixture }}"
          ARGS=""
          if [ -n "$PROOF" ]; then ARGS="$ARGS --evidence-mode --proof-state=$PROOF"; fi
          if [ -n "$FIXTURE" ]; then ARGS="$ARGS --fixture=$FIXTURE"; fi
          # The runner emits the JSON summary to stdout; the evidence
          # generator wraps it into the structured runner-result.json the
          # accept-evidence tool fetches + verifies.
          node scripts/field-replay/generate-evidence.mjs \
            --subject-sha="${{ github.event.inputs.subject_sha }}" \
            --base-sha="${{ github.event.pull_request.base.sha || github.sha }}" \
            $ARGS > runner-result.json
          cat runner-result.json

      - name: Upload structured runner result
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: field-replay-evidence
          path: runner-result.json
          if-no-files-found: error
