name: Field Replay Nightly (live advisory lane)

# The real-model advisory lane (plan replay-corpus-gate-2026-07 Item 3).
# Same fixtures, replayed through the REAL model — the only lane that catches
# model-behaviour/routing failures a recorded-response replay is structurally
# blind to. ADVISORY: reports drift, NEVER blocks a merge.
#
# SPLIT into two jobs sharing the corpus command (environment protection is
# PER JOB, not per event — one environment-gated job would force a human
# approval onto every SCHEDULED nightly, silently converting the automatic
# lane into a manual one):
#   - scheduled: runs from the default branch WITHOUT the approval
#     environment;
#   - manual: workflow_dispatch on refs/heads/main ONLY, gated by the
#     `field-replay-vendor-manual` protected environment (Derek as required
#     reviewer, prevent_self_review: false, deployment branches = main).
# Both serialized by ONE concurrency group so overlapping runs can't
# multiply the £10/mo envelope.
#
# *** PROVISIONING IS A HUMAN STEP *** — until the `ANTHROPIC_API_KEY` repo
# secret exists AND the `field-replay-vendor-manual` protected environment
# is configured, the vendor step no-ops with a notice (the guard mirrors
# pwa-replay-nightly). A skipping workflow is NOT a delivered lane: Item 3
# completion requires a manually dispatched, non-skipped run whose summary
# proves discovered/executed/vendor-call counts > 0 (see the completion
# gate in the plan). Pinned to Node 20.20.2 via the replay-runtime file.

on:
  schedule:
    - cron: '41 3 * * *' # 03:41 UTC nightly (offset from pwa-replay-nightly)
  workflow_dispatch:
    inputs:
      acknowledge_vendor_cost:
        description: 'Acknowledge this run will call the paid model (after environment approval)'
        required: true
        default: 'false'

permissions:
  contents: read
  issues: write

concurrency:
  group: field-replay-nightly
  cancel-in-progress: false

jobs:
  # SCHEDULED vendor job — default branch, no approval environment.
  scheduled-live:
    name: Scheduled live lane
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    timeout-minutes: 30
    steps:
      - name: Vendor-key guard (provisioning is a human step)
        id: guard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::notice::ANTHROPIC_API_KEY not provisioned — field-replay live lane skipped (advisory)."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        if: steps.guard.outputs.run == 'true'
        with:
          persist-credentials: false
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        if: steps.guard.outputs.run == 'true'
        with:
          node-version: '20.20.2'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --ignore-scripts
        if: steps.guard.outputs.run == 'true'
      - name: No AWS credentials assertion
        if: steps.guard.outputs.run == 'true'
        run: |
          if [ -n "${AWS_ACCESS_KEY_ID:-}" ] || [ -n "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "::error::AWS credentials present in the live lane — must fail closed"; exit 1
          fi
      - name: Live corpus (advisory) + budget envelope guard
        if: steps.guard.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CI: true
        run: node scripts/field-replay/nightly-live.mjs

  # MANUAL vendor job — main-only, protected environment.
  manual-live:
    name: Manual live lane (protected)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    environment: field-replay-vendor-manual
    timeout-minutes: 30
    steps:
      # Checkout FIRST so the verify script exists on the runner. The
      # `environment:` gate above already blocks this job behind Derek's
      # approval before ANY step runs, so ordering checkout ahead of the
      # verify step does not weaken the human gate — it only fixes the job
      # crashing on a missing script path (the verify step previously ran
      # before checkout and could never find verify-env-protection.mjs).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Verify environment protection before any vendor call
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/field-replay/verify-env-protection.mjs --environment=field-replay-vendor-manual
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: '20.20.2'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci --ignore-scripts
      - name: Live corpus (advisory) + budget envelope guard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CI: true
          FRC_VENDOR_ACK: ${{ github.event.inputs.acknowledge_vendor_cost }}
        run: node scripts/field-replay/nightly-live.mjs
